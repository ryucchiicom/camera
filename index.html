<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --bar-h: 132px;
      --btn: 84px;
      --side: 20px;
      --swap-dur: 360ms;
      --zoom-dur: 180ms;
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    #viewport{
      position: absolute;
      inset: 0 0 var(--bar-h) 0;
      overflow: hidden;
      background: #000;
    }

    #camera{
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      transform-origin: center center;
      transition: transform var(--zoom-dur) ease;
    }

    #gestureLayer{
      position: absolute;
      inset: 0;
      z-index: 4;
      touch-action: none;
    }

    #topHud{
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.48);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
    }

    .pillButton{
      pointer-events: auto;
      cursor: pointer;
      border: none;
      outline: none;
      color: #fff;
      background: rgba(0,0,0,.48);
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
    }

    .pillButton:active{
      transform: scale(.96);
    }

    #zoomPill{
      pointer-events: auto;
      cursor: pointer;
    }

    #zoomPill.show{
      background: rgba(20,20,20,.72);
    }

    #memoryBtn.hasItems{
      background: rgba(0,0,0,.68);
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.70);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #controls{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: var(--bar-h);
      background: #000;
      border-top: 1px solid rgba(255,255,255,.06);
      overflow: hidden;
    }

    .controlBtn{
      position: absolute;
      bottom: 22px;
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 3;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.4);
      touch-action: manipulation;
    }

    .controlBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #photoBtn{
      left: calc(100% - var(--side) - var(--btn));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.45), 0 8px 22px rgba(0,0,0,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording .innerDot{
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #swapGestureZone{
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 140px;
      height: var(--bar-h);
      z-index: 2;
      touch-action: none;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.35);
      font-size: 15px;
      letter-spacing: 1px;
    }

    #swapGestureZone::before{
      content: "";
      position: absolute;
      width: 84px;
      height: 48px;
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    #switchCameraBtn{
      position: absolute;
      left: 50%;
      bottom: 36px;
      transform: translateX(-50%);
      z-index: 4;
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,.10);
      color: #fff;
      font-size: 20px;
      line-height: 46px;
      text-align: center;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
      touch-action: manipulation;
    }

    #switchCameraBtn:active{
      transform: translateX(-50%) scale(.94);
    }

    #hiddenCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <video id="camera" autoplay playsinline muted></video>
      <div id="gestureLayer"></div>

      <div id="topHud">
        <div id="memoryBtn" class="pill pillButton">メモリ保存 0</div>
        <div id="zoomPill" class="pill pillButton">x1</div>
      </div>

      <div id="message"></div>
    </div>

    <div id="controls">
      <div id="swapGestureZone" aria-hidden="true"></div>

      <button id="switchCameraBtn" aria-label="前後カメラ切り替え">↺</button>

      <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
        <span class="innerDot"></span>
      </button>

      <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
        <span class="innerDot"></span>
      </button>
    </div>

    <canvas id="hiddenCanvas"></canvas>
  </div>

  <script>
    const video = document.getElementById('camera');
    const app = document.getElementById('app');
    const viewport = document.getElementById('viewport');
    const gestureLayer = document.getElementById('gestureLayer');
    const controls = document.getElementById('controls');
    const swapGestureZone = document.getElementById('swapGestureZone');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const switchCameraBtn = document.getElementById('switchCameraBtn');
    const zoomPill = document.getElementById('zoomPill');
    const memoryBtn = document.getElementById('memoryBtn');
    const messageBox = document.getElementById('message');
    const hiddenCanvas = document.getElementById('hiddenCanvas');

    let stream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let swapped = false;
    let facingMode = 'environment';

    let currentZoom = 1;
    const minZoom = 0.5;
    const maxZoom = 8;

    let activeTrack = null;
    let supportsTrackZoom = false;

    const memoryItems = [];

    let swipeStartX = 0;
    let swipeStartY = 0;
    let gestureMode = null;
    let gestureLocked = false;

    function showMessage(text, ms = 2200){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function updateMemoryLabel(){
      memoryBtn.textContent = `メモリ保存 ${memoryItems.length}`;
      memoryBtn.classList.toggle('hasItems', memoryItems.length > 0);
    }

    function showZoom(){
      zoomPill.textContent = `x${currentZoom}`;
      zoomPill.classList.add('show');
      clearTimeout(showZoom._t);
      showZoom._t = setTimeout(() => zoomPill.classList.remove('show'), 900);
    }

    function updateZoomVisual(){
      video.style.transform = `scale(${currentZoom})`;
      showZoom();
    }

    async function applyHardwareZoom(value){
      if (!activeTrack || !supportsTrackZoom) return false;
      try{
        await activeTrack.applyConstraints({
          advanced: [{ zoom: value }]
        });
        return true;
      }catch(err){
        return false;
      }
    }

    async function setZoom(nextZoom){
      const clamped = Math.max(minZoom, Math.min(maxZoom, nextZoom));
      if (clamped === currentZoom) return;
      currentZoom = clamped;
      updateZoomVisual();
      await applyHardwareZoom(currentZoom);
    }

    function nextZoomUp(){
      if (currentZoom < 1) return 1;
      if (currentZoom === 1) return 2;
      return Math.min(maxZoom, currentZoom + 1);
    }

    function nextZoomDown(){
      if (currentZoom > 1) return currentZoom - 1;
      if (currentZoom === 1) return 0.5;
      return 0.5;
    }

    function toggleSwap(){
      swapped = !swapped;

      if (swapped){
        videoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
        photoBtn.style.left = `var(--side)`;
      }else{
        videoBtn.style.left = `var(--side)`;
        photoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
      }
    }

    function getBestMimeType(){
      if (!window.MediaRecorder) return '';
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const type of candidates){
        try{
          if (MediaRecorder.isTypeSupported(type)) return type;
        }catch(e){}
      }
      return '';
    }

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    function formatDate(){
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        pad(d.getMonth() + 1) +
        pad(d.getDate()) + '_' +
        pad(d.getHours()) +
        pad(d.getMinutes()) +
        pad(d.getSeconds())
      );
    }

    function makeMemoryName(kind, ext){
      return `${kind}_${formatDate()}_${String(memoryItems.length + 1).padStart(2, '0')}.${ext}`;
    }

    function storeMemoryItem(blob, filename, type){
      memoryItems.push({ blob, filename, type, createdAt: Date.now() });
      updateMemoryLabel();
    }

    function drawZoomedFrameToCanvas(canvas, sourceVideo, zoom){
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      const vw = sourceVideo.videoWidth;
      const vh = sourceVideo.videoHeight;

      if (!vw || !vh) return false;

      canvas.width = vw;
      canvas.height = vh;

      if (zoom <= 1){
        ctx.drawImage(sourceVideo, 0, 0, vw, vh);
        return true;
      }

      const cropW = vw / zoom;
      const cropH = vh / zoom;
      const sx = Math.max(0, (vw - cropW) / 2);
      const sy = Math.max(0, (vh - cropH) / 2);

      ctx.drawImage(sourceVideo, sx, sy, cropW, cropH, 0, 0, vw, vh);
      return true;
    }

    function capturePhoto(){
      if (!video.videoWidth || !video.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const ok = drawZoomedFrameToCanvas(hiddenCanvas, video, currentZoom);
      if (!ok){
        showMessage('写真を撮れなかった');
        return;
      }

      hiddenCanvas.toBlob((blob) => {
        if (!blob){
          showMessage('写真の保存に失敗した');
          return;
        }

        const filename = makeMemoryName('photo', 'jpg');
        storeMemoryItem(blob, filename, 'image/jpeg');
        showMessage('写真をメモリに保存したよ', 1200);
      }, 'image/jpeg', 0.95);
    }

    function startRecording(){
      if (!stream){
        showMessage('カメラの準備がまだだよ');
        return;
      }
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      const mimeType = getBestMimeType();
      try{
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      }catch(err){
        console.error(err);
        showMessage('動画録画を開始できなかった');
        return;
      }

      recordedChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const type = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
        const blob = new Blob(recordedChunks, { type });

        if (blob.size > 0){
          const ext = type.includes('mp4') ? 'mp4' : 'webm';
          const filename = makeMemoryName('video', ext);
          storeMemoryItem(blob, filename, type);
          showMessage('動画をメモリに保存したよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;
      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }
      isRecording = false;
      videoBtn.classList.remove('recording');
      showMessage('録画ストップ', 1000);
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    async function saveMemoryToDirectory(){
      if (memoryItems.length === 0){
        showMessage('メモリは空だよ');
        return;
      }

      if ('showDirectoryPicker' in window){
        try{
          const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
          for (const item of memoryItems){
            const fileHandle = await dirHandle.getFileHandle(item.filename, { create: true });
            const writable = await fileHandle.createWritable();
            await writable.write(item.blob);
            await writable.close();
          }
          memoryItems.length = 0;
          updateMemoryLabel();
          showMessage('メモリを全部保存したよ', 1400);
          return;
        }catch(err){
          console.error(err);
          showMessage('フォルダ保存をやめたか、失敗したよ');
          return;
        }
      }

      try{
        for (let i = 0; i < memoryItems.length; i++){
          const item = memoryItems[i];
          downloadBlob(item.blob, item.filename);
          await new Promise(r => setTimeout(r, 250));
        }
        memoryItems.length = 0;
        updateMemoryLabel();
        showMessage('メモリを保存したよ', 1400);
      }catch(err){
        console.error(err);
        showMessage('保存に失敗したよ');
      }
    }

    async function switchCamera(){
      facingMode = (facingMode === 'environment') ? 'user' : 'environment';

      if (isRecording){
        stopRecording();
      }

      if (stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }

      await startCamera();
    }

    async function startCamera(){
      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const tracks = stream.getVideoTracks();
        activeTrack = tracks && tracks[0] ? tracks[0] : null;

        supportsTrackZoom = false;
        if (activeTrack && activeTrack.getCapabilities){
          try{
            const cap = activeTrack.getCapabilities();
            supportsTrackZoom = typeof cap.zoom !== 'undefined';
            if (supportsTrackZoom && cap.zoom){
              if (typeof cap.zoom.min === 'number') currentZoom = Math.max(currentZoom, cap.zoom.min);
              if (typeof cap.zoom.max === 'number') {
                // 上限は8のままでもいいけど、端末側がもっと狭ければそれに合わせる
                if (cap.zoom.max < maxZoom) {
                  // maxZoom は const なのでそのまま。見た目だけこの範囲内で動かす
                }
              }
            }
          }catch(e){}
        }

        updateZoomVisual();
        showMessage('カメラ準備OK', 1000);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    function getSwipeDirection(dx, dy){
      if (Math.abs(dx) > Math.abs(dy)) return 'horizontal';
      return 'vertical';
    }

    function isInteractiveTarget(target){
      return !!target.closest('button, .pillButton');
    }

    app.addEventListener('pointerdown', (e) => {
      if (isInteractiveTarget(e.target)) return;

      gestureMode = 'global';
      gestureLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
      app.setPointerCapture(e.pointerId);
    });

    app.addEventListener('pointermove', async (e) => {
      if (gestureMode !== 'global' || gestureLocked) return;
      if (isInteractiveTarget(e.target)) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;

      if (getSwipeDirection(dx, dy) === 'vertical'){
        const distance = dy;
        if (Math.abs(distance) >= 70){
          gestureLocked = true;
          if (distance < 0){
            await setZoom(nextZoomUp());
          }else{
            await setZoom(nextZoomDown());
          }
          gestureMode = null;
        }
      }
    });

    app.addEventListener('pointerup', () => {
      gestureMode = null;
      gestureLocked = false;
    });

    app.addEventListener('pointercancel', () => {
      gestureMode = null;
      gestureLocked = false;
    });

    swapGestureZone.addEventListener('pointerdown', (e) => {
      gestureMode = 'swap';
      gestureLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
      swapGestureZone.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    swapGestureZone.addEventListener('pointermove', (e) => {
      if (gestureMode !== 'swap' || gestureLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
        gestureLocked = true;
        toggleSwap();
        gestureMode = null;
      }
    });

    swapGestureZone.addEventListener('pointerup', () => {
      gestureMode = null;
      gestureLocked = false;
    });

    swapGestureZone.addEventListener('pointercancel', () => {
      gestureMode = null;
      gestureLocked = false;
    });

    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);
    switchCameraBtn.addEventListener('click', switchCamera);
    memoryBtn.addEventListener('click', saveMemoryToDirectory);

    zoomPill.addEventListener('click', async () => {
      await setZoom(1);
      showMessage('1倍に戻したよ', 900);
    });

    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording'){
        try{ mediaRecorder.stop(); }catch(e){}
      }
      if (stream){
        stream.getTracks().forEach(t => t.stop());
      }
    });

    updateMemoryLabel();
    startCamera();
  </script>
</body>
</html>
