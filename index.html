<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --bar-h: 128px;
      --btn: 84px;
      --flip-btn: 42px;
      --side: 20px;
      --swap-dur: 360ms;
      --zoom-dur: 180ms;
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      touch-action: none;
    }

    #viewport{
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      touch-action: none;
    }

    #camera{
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      transform-origin: center center;
      transition: transform var(--zoom-dur) ease;
    }

    #topHud{
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 13px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
    }

    #zoomPill{
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #zoomPill.show{
      opacity: 1;
      transform: translateY(0);
    }

    #controls{
      position: relative;
      height: var(--bar-h);
      background: #000;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.06);
      touch-action: none;
    }

    .controlBtn{
      position: absolute;
      bottom: 22px;
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 3;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.4);
      touch-action: manipulation;
    }

    .controlBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #photoBtn{
      left: calc(100% - var(--side) - var(--btn));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #controls.swapped #videoBtn{
      left: calc(100% - var(--side) - var(--btn));
    }

    #controls.swapped #photoBtn{
      left: var(--side);
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.45), 0 8px 22px rgba(0,0,0,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording .innerDot{
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #flipBtn{
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: var(--flip-btn);
      height: var(--flip-btn);
      transform: translateX(-50%);
      border-radius: 50%;
      border: none;
      z-index: 4;
      background: rgba(255,255,255,.10);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.16);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
      touch-action: manipulation;
    }

    #flipBtn:active{
      transform: translateX(-50%) scale(.94);
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.68);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #hiddenCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <video id="camera" autoplay playsinline muted></video>

      <div id="topHud">
        <div class="pill" id="recPill">LIVE</div>
      </div>

      <div class="pill" id="zoomPill">x1</div>
      <div id="message"></div>
    </div>

    <div id="controls">
      <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
        <span class="innerDot"></span>
      </button>

      <button id="flipBtn" aria-label="前後カメラ切り替え">↺</button>

      <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
        <span class="innerDot"></span>
      </button>
    </div>

    <canvas id="hiddenCanvas"></canvas>
  </div>

  <script>
    const video = document.getElementById('camera');
    const app = document.getElementById('app');
    const viewport = document.getElementById('viewport');
    const controls = document.getElementById('controls');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const flipBtn = document.getElementById('flipBtn');
    const zoomPill = document.getElementById('zoomPill');
    const recPill = document.getElementById('recPill');
    const messageBox = document.getElementById('message');
    const hiddenCanvas = document.getElementById('hiddenCanvas');

    let stream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let currentFacingMode = 'environment';
    let activeTrack = null;
    let supportsTrackZoom = false;

    let currentZoom = 1;
    const zoomLevels = [0.5, 1, 2, 3, 4, 5, 6, 7, 8];
    let maxZoom = 8;

    let gestureStartX = 0;
    let gestureStartY = 0;
    let gestureStartTime = 0;
    let gestureTarget = null;
    let gestureLocked = false;

    function showMessage(text, ms = 2200){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function showZoom(){
      zoomPill.textContent = `x${currentZoom}`;
      zoomPill.classList.add('show');
      clearTimeout(showZoom._t);
      showZoom._t = setTimeout(() => zoomPill.classList.remove('show'), 900);
    }

    function updateZoomVisual(){
      video.style.transform = `scale(${currentZoom})`;
      showZoom();
    }

    async function applyHardwareZoom(value){
      if (!activeTrack || !supportsTrackZoom) return false;
      try{
        await activeTrack.applyConstraints({
          advanced: [{ zoom: value }]
        });
        return true;
      }catch(err){
        return false;
      }
    }

    function getNextZoom(direction){
      const sorted = zoomLevels.filter(z => z <= maxZoom);
      const idx = sorted.findIndex(z => z === currentZoom);

      if (direction > 0){
        if (currentZoom < 1){
          return 1;
        }
        const next = sorted[idx + 1];
        return next ?? sorted[sorted.length - 1];
      }else{
        if (currentZoom > 1){
          return sorted[idx - 1] ?? 1;
        }
        return 0.5;
      }
    }

    async function setZoom(nextZoom){
      const clamped = Math.max(0.5, Math.min(maxZoom, nextZoom));
      if (clamped === currentZoom) return;

      currentZoom = clamped;
      updateZoomVisual();

      const ok = await applyHardwareZoom(currentZoom);
      if (!ok && activeTrack){
        // ハードウェアズーム非対応でも、見た目のズームは維持
      }
    }

    function toggleSwap(){
      controls.classList.toggle('swapped');
    }

    function getBestMimeType(){
      if (!window.MediaRecorder) return '';
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const type of candidates){
        try{
          if (MediaRecorder.isTypeSupported(type)) return type;
        }catch(e){}
      }
      return '';
    }

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
    }

    async function savePhotoBestEffort(blob, filename){
      const file = new File([blob], filename, { type: blob.type || 'image/jpeg' });

      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })){
        try{
          await navigator.share({
            files: [file],
            title: 'Photo'
          });
          showMessage('共有シートを出したよ', 1200);
          return;
        }catch(err){
          // キャンセルや非対応時はダウンロードへ
        }
      }

      downloadBlob(blob, filename);
      showMessage('写真を保存したよ', 1200);
    }

    function formatDate(){
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        pad(d.getMonth() + 1) +
        pad(d.getDate()) + '_' +
        pad(d.getHours()) +
        pad(d.getMinutes()) +
        pad(d.getSeconds())
      );
    }

    function drawFrameToCanvas(canvas, sourceVideo, zoom){
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      const vw = sourceVideo.videoWidth;
      const vh = sourceVideo.videoHeight;

      if (!vw || !vh) return false;

      canvas.width = vw;
      canvas.height = vh;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, vw, vh);

      if (zoom >= 1){
        const cropW = vw / zoom;
        const cropH = vh / zoom;
        const sx = Math.max(0, (vw - cropW) / 2);
        const sy = Math.max(0, (vh - cropH) / 2);
        ctx.drawImage(sourceVideo, sx, sy, cropW, cropH, 0, 0, vw, vh);
      }else{
        const drawW = vw * zoom;
        const drawH = vh * zoom;
        const dx = (vw - drawW) / 2;
        const dy = (vh - drawH) / 2;
        ctx.drawImage(sourceVideo, dx, dy, drawW, drawH);
      }

      return true;
    }

    async function capturePhoto(){
      if (!video.videoWidth || !video.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const ok = drawFrameToCanvas(hiddenCanvas, video, currentZoom);
      if (!ok){
        showMessage('写真を撮れなかった');
        return;
      }

      hiddenCanvas.toBlob(async (blob) => {
        if (!blob){
          showMessage('写真の保存に失敗した');
          return;
        }
        await savePhotoBestEffort(blob, `photo_${formatDate()}.jpg`);
      }, 'image/jpeg', 0.95);
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;

      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }
      isRecording = false;
      videoBtn.classList.remove('recording');
      recPill.textContent = 'LIVE';
      showMessage('録画ストップ', 1000);
    }

    function startRecording(){
      if (!stream){
        showMessage('カメラの準備がまだだよ');
        return;
      }
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      const mimeType = getBestMimeType();
      try{
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      }catch(err){
        console.error(err);
        showMessage('録画を開始できなかった');
        return;
      }

      recordedChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const type = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
        const blob = new Blob(recordedChunks, { type });
        if (blob.size > 0){
          const ext = type.includes('mp4') ? 'mp4' : 'webm';
          downloadBlob(blob, `video_${formatDate()}.${ext}`);
          showMessage('動画を保存したよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        recPill.textContent = 'REC';
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    async function startCamera(){
      try{
        if (stream){
          stream.getTracks().forEach(t => t.stop());
          stream = null;
        }

        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const tracks = stream.getVideoTracks();
        activeTrack = tracks && tracks[0] ? tracks[0] : null;

        supportsTrackZoom = false;
        maxZoom = 8;
        currentZoom = Math.max(0.5, Math.min(currentZoom, maxZoom));

        if (activeTrack && activeTrack.getCapabilities){
          try{
            const cap = activeTrack.getCapabilities();
            if (cap && typeof cap.zoom !== 'undefined'){
              supportsTrackZoom = true;
              if (cap.zoom){
                if (typeof cap.zoom.max === 'number'){
                  maxZoom = Math.min(maxZoom, cap.zoom.max);
                }
                if (typeof cap.zoom.min === 'number' && cap.zoom.min > 0){
                  // 0.5 は画面上の見た目用として残す
                  currentZoom = Math.max(currentZoom, Math.min(1, cap.zoom.min));
                }
              }
            }
          }catch(e){}
        }

        updateZoomVisual();
        showMessage(currentFacingMode === 'environment' ? '背面カメラ' : '前面カメラ', 900);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    async function switchCamera(){
      if (isRecording){
        stopRecording();
      }
      currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
      await startCamera();
    }

    function handleSwipe(startX, startY, endX, endY, targetIsControlArea){
      const dx = endX - startX;
      const dy = endY - startY;
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);

      if (adx < 18 && ady < 18) return;

      if (ady > adx){
        const direction = dy < 0 ? 1 : -1;
        const nextZoom = getNextZoom(direction);
        setZoom(nextZoom);
        return;
      }

      if (targetIsControlArea && adx > ady){
        toggleSwap();
      }
    }

    app.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;

      gestureTarget = e.target;
      gestureLocked = false;
      gestureStartX = e.clientX;
      gestureStartY = e.clientY;
      gestureStartTime = performance.now();

      try{
        app.setPointerCapture(e.pointerId);
      }catch(err){}
    });

    app.addEventListener('pointerup', (e) => {
      if (e.target.closest('button')) return;
      if (!gestureTarget) return;

      const endX = e.clientX;
      const endY = e.clientY;
      const startInControls = gestureStartY >= (window.innerHeight - 128);

      handleSwipe(gestureStartX, gestureStartY, endX, endY, startInControls);

      gestureTarget = null;
      gestureLocked = false;
    });

    app.addEventListener('pointercancel', () => {
      gestureTarget = null;
      gestureLocked = false;
    });

    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);
    flipBtn.addEventListener('click', switchCamera);

    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording'){
        try{ mediaRecorder.stop(); }catch(e){}
      }
      if (stream){
        stream.getTracks().forEach(t => t.stop());
      }
    });

    startCamera();
  </script>
</body>
</html>
