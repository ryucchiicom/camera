<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --bar-h: 176px;
      --gallery-h: 72px;
      --btn: 84px;
      --switch-btn: 44px;
      --side: 18px;
      --swap-dur: 340ms;
      --zoom-dur: 170ms;
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    #viewport{
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #camera{
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      transform-origin: center center;
      transition: transform var(--zoom-dur) ease;
    }

    #gestureLayer{
      position: absolute;
      inset: 0;
      z-index: 5;
      touch-action: none;
    }

    #topHud{
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 13px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
    }

    #zoomPill{
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #zoomPill.show{
      opacity: 1;
      transform: translateY(0);
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.72);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #controls{
      position: relative;
      height: var(--bar-h);
      background: #000;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    #galleryWrap{
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: var(--gallery-h);
      padding: 10px 12px 0;
      overflow: hidden;
    }

    #galleryTitle{
      color: rgba(255,255,255,.72);
      font-size: 12px;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    #emptyHint{
      color: rgba(255,255,255,.35);
      font-size: 12px;
      margin-left: 6px;
    }

    #gallery{
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overflow-y: hidden;
      padding-bottom: 6px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      touch-action: pan-x;
    }

    #gallery::-webkit-scrollbar{
      display: none;
    }

    .captureItem{
      flex: 0 0 auto;
      width: 54px;
      height: 54px;
      border-radius: 12px;
      overflow: hidden;
      position: relative;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
    }

    .captureItem img,
    .captureItem video{
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .captureBadge{
      position: absolute;
      left: 4px;
      top: 4px;
      padding: 2px 5px;
      border-radius: 999px;
      font-size: 9px;
      line-height: 1;
      background: rgba(0,0,0,.6);
      color: #fff;
      z-index: 2;
      pointer-events: none;
    }

    #buttonRow{
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 104px;
    }

    .controlBtn{
      position: absolute;
      bottom: 18px;
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 3;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.42);
      touch-action: manipulation;
    }

    .controlBtn:active,
    .miniBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.42);
    }

    #photoBtn{
      left: calc(100% - var(--side) - var(--btn));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.42);
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    #videoBtn.recording .innerDot{
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #switchBtn{
      position: absolute;
      left: 50%;
      bottom: 26px;
      transform: translateX(-50%);
      width: var(--switch-btn);
      height: var(--switch-btn);
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.08);
      color: #fff;
      z-index: 4;
      font-size: 18px;
      box-shadow: 0 8px 18px rgba(0,0,0,.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #swapHint{
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 130px;
      height: 100%;
      z-index: 1;
      pointer-events: auto;
      touch-action: none;
    }

    #swapHint::before{
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 86px;
      height: 44px;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.45), 0 8px 22px rgba(0,0,0,.42); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.42); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.42); }
    }

    #hiddenCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <video id="camera" autoplay playsinline muted></video>
      <div id="gestureLayer"></div>

      <div id="topHud">
        <div class="pill" id="recPill">LIVE</div>
      </div>

      <div class="pill" id="zoomPill">x1</div>
      <div id="message"></div>
    </div>

    <div id="controls">
      <div id="galleryWrap">
        <div id="galleryTitle">
          <span>アルバム</span>
          <span id="emptyHint">ここに保存される</span>
        </div>
        <div id="gallery"></div>
      </div>

      <div id="buttonRow">
        <div id="swapHint" aria-label="左右のボタンを入れ替え"></div>

        <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
          <span class="innerDot"></span>
        </button>

        <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
          <span class="innerDot"></span>
        </button>

        <button id="switchBtn" aria-label="前後カメラを切り替え">⇄</button>
      </div>
    </div>

    <canvas id="hiddenCanvas"></canvas>
  </div>

  <script>
    const video = document.getElementById('camera');
    const viewport = document.getElementById('viewport');
    const gestureLayer = document.getElementById('gestureLayer');
    const controls = document.getElementById('controls');
    const swapHint = document.getElementById('swapHint');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const switchBtn = document.getElementById('switchBtn');
    const zoomPill = document.getElementById('zoomPill');
    const recPill = document.getElementById('recPill');
    const messageBox = document.getElementById('message');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const gallery = document.getElementById('gallery');
    const emptyHint = document.getElementById('emptyHint');

    let stream = null;
    let activeTrack = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let swapped = false;
    let currentFacing = 'environment';

    const zoomLevels = [0.5, 1, 2, 3, 4, 5, 6, 7, 8];
    let currentZoomIndex = 1; // x1
    let currentZoom = zoomLevels[currentZoomIndex];

    let supportsTrackZoom = false;
    let trackZoomMax = 8;
    let trackZoomMin = 1;

    let dbPromise = null;

    let pointerDown = false;
    let startX = 0;
    let startY = 0;
    let gestureType = null; // zoom | swap | null
    let gestureFired = false;

    function showMessage(text, ms = 1800){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function showZoom(){
      zoomPill.textContent = `x${currentZoom}`;
      zoomPill.classList.add('show');
      clearTimeout(showZoom._t);
      showZoom._t = setTimeout(() => zoomPill.classList.remove('show'), 900);
    }

    function updateZoomVisual(){
      video.style.transform = `scale(${currentZoom})`;
      showZoom();
    }

    function toggleSwap(){
      swapped = !swapped;

      if (swapped){
        videoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
        photoBtn.style.left = `var(--side)`;
      }else{
        videoBtn.style.left = `var(--side)`;
        photoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
      }
    }

    function getBestMimeType(){
      if (!window.MediaRecorder) return '';
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm',
        'video/mp4'
      ];
      for (const type of candidates){
        try{
          if (MediaRecorder.isTypeSupported(type)) return type;
        }catch(e){}
      }
      return '';
    }

    function formatDate(){
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        pad(d.getMonth() + 1) +
        pad(d.getDate()) + '_' +
        pad(d.getHours()) +
        pad(d.getMinutes()) +
        pad(d.getSeconds())
      );
    }

    function drawZoomedFrameToCanvas(canvas, sourceVideo, zoom){
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      const vw = sourceVideo.videoWidth;
      const vh = sourceVideo.videoHeight;

      if (!vw || !vh) return false;

      canvas.width = vw;
      canvas.height = vh;

      if (zoom <= 1){
        ctx.drawImage(sourceVideo, 0, 0, vw, vh);
        return true;
      }

      const cropW = vw / zoom;
      const cropH = vh / zoom;
      const sx = Math.max(0, (vw - cropW) / 2);
      const sy = Math.max(0, (vh - cropH) / 2);

      ctx.drawImage(sourceVideo, sx, sy, cropW, cropH, 0, 0, vw, vh);
      return true;
    }

    function openDB(){
      if (dbPromise) return dbPromise;

      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open('camera_app_db', 1);

        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('captures')){
            db.createObjectStore('captures', { keyPath: 'id' });
          }
        };

        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });

      return dbPromise;
    }

    async function saveCapture(kind, blob){
      const db = await openDB();
      const id = `${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
      const item = { id, kind, blob, createdAt: Date.now() };

      await new Promise((resolve, reject) => {
        const tx = db.transaction('captures', 'readwrite');
        tx.objectStore('captures').put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });

      return item;
    }

    async function loadCaptures(){
      const db = await openDB();
      const items = await new Promise((resolve, reject) => {
        const tx = db.transaction('captures', 'readonly');
        const req = tx.objectStore('captures').getAll();
        req.onsuccess = () => resolve(req.result || []);
        req.onerror = () => reject(req.error);
      });

      items.sort((a, b) => b.createdAt - a.createdAt);
      return items;
    }

    function renderGalleryItem(item){
      const wrap = document.createElement('div');
      wrap.className = 'captureItem';

      const badge = document.createElement('div');
      badge.className = 'captureBadge';
      badge.textContent = item.kind === 'video' ? 'V' : 'P';
      wrap.appendChild(badge);

      const url = URL.createObjectURL(item.blob);

      if (item.kind === 'photo'){
        const img = document.createElement('img');
        img.src = url;
        img.alt = 'photo';
        wrap.appendChild(img);
      }else{
        const vid = document.createElement('video');
        vid.src = url;
        vid.muted = true;
        vid.loop = true;
        vid.playsInline = true;
        vid.autoplay = true;
        vid.controls = false;
        wrap.appendChild(vid);
        vid.play().catch(()=>{});
      }

      gallery.prepend(wrap);
      emptyHint.style.display = 'none';
    }

    async function refreshGallery(){
      gallery.innerHTML = '';
      const items = await loadCaptures();
      if (!items.length){
        emptyHint.style.display = 'inline';
        return;
      }
      emptyHint.style.display = 'none';
      for (const item of items){
        renderGalleryItem(item);
      }
    }

    function nextZoom(){
      if (currentZoomIndex < zoomLevels.length - 1){
        currentZoomIndex++;
        currentZoom = zoomLevels[currentZoomIndex];
        return true;
      }
      return false;
    }

    function prevZoom(){
      if (currentZoomIndex > 0){
        currentZoomIndex--;
        currentZoom = zoomLevels[currentZoomIndex];
        return true;
      }
      return false;
    }

    async function applyHardwareZoom(value){
      if (!activeTrack || !supportsTrackZoom) return false;
      const clamped = Math.max(trackZoomMin, Math.min(trackZoomMax, value));
      try{
        await activeTrack.applyConstraints({
          advanced: [{ zoom: clamped }]
        });
        return true;
      }catch(err){
        return false;
      }
    }

    async function setZoomByIndex(nextIndex){
      const clamped = Math.max(0, Math.min(zoomLevels.length - 1, nextIndex));
      if (clamped === currentZoomIndex) return;

      currentZoomIndex = clamped;
      currentZoom = zoomLevels[currentZoomIndex];
      updateZoomVisual();
      await applyHardwareZoom(currentZoom);
    }

    async function zoomUp(){
      if (currentZoomIndex >= zoomLevels.length - 1) return;
      await setZoomByIndex(currentZoomIndex + 1);
    }

    async function zoomDown(){
      if (currentZoomIndex <= 0) return;
      await setZoomByIndex(currentZoomIndex - 1);
    }

    async function capturePhoto(){
      if (!video.videoWidth || !video.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const ok = drawZoomedFrameToCanvas(hiddenCanvas, video, currentZoom);
      if (!ok){
        showMessage('写真を撮れなかった');
        return;
      }

      hiddenCanvas.toBlob(async (blob) => {
        if (!blob){
          showMessage('写真の保存に失敗した');
          return;
        }

        await saveCapture('photo', blob);
        await refreshGallery();
        showMessage('写真をアルバムに入れたよ', 1200);
      }, 'image/jpeg', 0.95);
    }

    function startRecording(){
      if (!stream){
        showMessage('カメラの準備がまだだよ');
        return;
      }
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      const mimeType = getBestMimeType();

      try{
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      }catch(err){
        console.error(err);
        showMessage('動画録画を開始できなかった');
        return;
      }

      recordedChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = async () => {
        const type = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
        const blob = new Blob(recordedChunks, { type });
        if (blob.size > 0){
          await saveCapture('video', blob);
          await refreshGallery();
          showMessage('動画をアルバムに入れたよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        recPill.textContent = 'REC';
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;

      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }

      isRecording = false;
      videoBtn.classList.remove('recording');
      recPill.textContent = 'LIVE';
      showMessage('録画ストップ', 1000);
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    async function stopCamera(){
      if (stream){
        stream.getTracks().forEach(t => t.stop());
      }
      stream = null;
      activeTrack = null;
      supportsTrackZoom = false;
    }

    async function startCamera(facing = currentFacing){
      currentFacing = facing;

      await stopCamera();

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facing },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: true
        });

        video.srcObject = stream;
        await video.play();

        const tracks = stream.getVideoTracks();
        activeTrack = tracks && tracks[0] ? tracks[0] : null;

        if (activeTrack && activeTrack.getCapabilities){
          const caps = activeTrack.getCapabilities();
          supportsTrackZoom = typeof caps.zoom !== 'undefined';

          if (supportsTrackZoom){
            if (typeof caps.zoom.min === 'number') trackZoomMin = caps.zoom.min;
            if (typeof caps.zoom.max === 'number') trackZoomMax = caps.zoom.max;
            await applyHardwareZoom(currentZoom);
          }
        }

        updateZoomVisual();
        showMessage(facing === 'environment' ? '背面カメラ' : '前面カメラ', 1000);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    async function toggleCameraFacing(){
      const nextFacing = currentFacing === 'environment' ? 'user' : 'environment';
      await startCamera(nextFacing);
    }

    function shouldIgnoreTarget(target){
      return !!target.closest('button');
    }

    function handlePointerDown(e, zone){
      if (shouldIgnoreTarget(e.target)) return;

      pointerDown = true;
      gestureType = zone;
      gestureFired = false;
      startX = e.clientX;
      startY = e.clientY;

      try{
        e.currentTarget.setPointerCapture(e.pointerId);
      }catch(err){}
    }

    function handlePointerMove(e){
      if (!pointerDown || gestureFired) return;

      const dx = e.clientX - startX;
      const dy = e.clientY - startY;

      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;

      const horizontal = Math.abs(dx) > Math.abs(dy);

      if (gestureType === 'swap'){
        if (horizontal && Math.abs(dx) > 42){
          gestureFired = true;
          toggleSwap();
        }
      }else{
        if (!horizontal && Math.abs(dy) > 42){
          gestureFired = true;
          if (dy < 0) zoomUp();
          else zoomDown();
        }
      }
    }

    function handlePointerUp(){
      pointerDown = false;
      gestureType = null;
      gestureFired = false;
    }

    // 画面上はズーム、下のボタン帯はズームか左右スワイプで切り替え
    gestureLayer.addEventListener('pointerdown', (e) => handlePointerDown(e, 'zoom'));
    gestureLayer.addEventListener('pointermove', handlePointerMove);
    gestureLayer.addEventListener('pointerup', handlePointerUp);
    gestureLayer.addEventListener('pointercancel', handlePointerUp);

    controls.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;
      if (e.target.closest('#gallery')) return;

      const rect = controls.getBoundingClientRect();
      const y = e.clientY - rect.top;

      if (y < 74){
        return;
      }

      handlePointerDown(e, 'swap');
    });
    controls.addEventListener('pointermove', handlePointerMove);
    controls.addEventListener('pointerup', handlePointerUp);
    controls.addEventListener('pointercancel', handlePointerUp);

    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);
    switchBtn.addEventListener('click', toggleCameraFacing);

    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording'){
        try{ mediaRecorder.stop(); }catch(e){}
      }
      if (stream){
        stream.getTracks().forEach(t => t.stop());
      }
    });

    (async () => {
      await refreshGallery();
      await startCamera('environment');
    })();
  </script>
</body>
</html>
