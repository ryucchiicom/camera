<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Camera App</title>

<style>
:root{
  --bar-h:132px;
  --btn:86px;
  --small-btn:46px;
  --side:18px;
  --swap-dur:360ms;
  --zoom-dur:180ms;
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  font-family:system-ui,sans-serif;
  touch-action:none;
  user-select:none;
  -webkit-user-select:none;
}

#app{
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  background:#000;
}

#viewport{
  position:relative;
  flex:1;
  overflow:hidden;
  background:#000;
}

#camera{
  width:100%;
  height:100%;
  object-fit:cover;
  background:#000;
  transform-origin:center;
  transition:transform var(--zoom-dur) ease;
}

#gestureLayer{
  position:absolute;
  inset:0;
  z-index:5;
}

#topHud{
  position:absolute;
  top:12px;
  left:12px;
  right:12px;
  z-index:20;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

.pill{
  padding:8px 12px;
  border-radius:999px;
  background:rgba(0,0,0,.45);
  color:#fff;
  font-size:13px;
  border:1px solid rgba(255,255,255,.12);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
}

#zoomPill{
  cursor:pointer;
}

#controls{
  position:relative;
  height:var(--bar-h);
  background:#000;
  border-top:1px solid rgba(255,255,255,.08);
}

.controlBtn{
  position:absolute;
  bottom:22px;
  width:var(--btn);
  height:var(--btn);
  border-radius:50%;
  border:none;
  outline:none;
  transition:left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
             transform 120ms ease;
}

.controlBtn:active{
  transform:scale(.94);
}

#videoBtn{
  left:var(--side);
  background:#ff2f2f;
}

#photoBtn{
  left:calc(100% - var(--side) - var(--btn));
  background:#fff;
}

#switchBtn{
  position:absolute;
  left:50%;
  bottom:31px;
  transform:translateX(-50%);
  width:var(--small-btn);
  height:var(--small-btn);
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,.12);
  color:#fff;
  font-size:18px;
}

#switchBtn:active{
  transform:translateX(-50%) scale(.94);
}

.innerDot{
  position:absolute;
  inset:0;
  margin:auto;
}

#videoBtn .innerDot{
  width:28px;
  height:28px;
  background:#fff;
  border-radius:10px;
}

#videoBtn.recording .innerDot{
  width:24px;
  height:24px;
  border-radius:6px;
}

#photoBtn .innerDot{
  width:24px;
  height:24px;
  border:4px solid #111;
  border-radius:50%;
}

#message{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  z-index:50;
  max-width:88%;
  padding:14px 16px;
  border-radius:16px;
  background:rgba(0,0,0,.68);
  color:#fff;
  font-size:14px;
  text-align:center;
  border:1px solid rgba(255,255,255,.10);
  opacity:0;
  transition:opacity 180ms ease;
  pointer-events:none;
}

#message.show{
  opacity:1;
}

#hiddenCanvas{
  display:none;
}
</style>
</head>

<body>

<div id="app">

  <div id="viewport">
    <video id="camera" autoplay playsinline muted></video>
    <div id="gestureLayer"></div>

    <div id="topHud">
      <div class="pill" id="zoomPill">x1</div>
      <div class="pill" id="memorySaveBtn">メモリ保存 0</div>
    </div>

    <div id="message"></div>
  </div>

  <div id="controls">

    <button id="videoBtn" class="controlBtn">
      <span class="innerDot"></span>
    </button>

    <button id="switchBtn">⇄</button>

    <button id="photoBtn" class="controlBtn">
      <span class="innerDot"></span>
    </button>

  </div>

  <canvas id="hiddenCanvas"></canvas>

</div>

<script>
const video = document.getElementById('camera');
const gestureLayer = document.getElementById('gestureLayer');
const controls = document.getElementById('controls');

const videoBtn = document.getElementById('videoBtn');
const photoBtn = document.getElementById('photoBtn');
const switchBtn = document.getElementById('switchBtn');

const zoomPill = document.getElementById('zoomPill');
const memorySaveBtn = document.getElementById('memorySaveBtn');

const messageBox = document.getElementById('message');
const hiddenCanvas = document.getElementById('hiddenCanvas');

let stream = null;
let activeTrack = null;

let mediaRecorder = null;
let recordedChunks = [];
let isRecording = false;

let swapped = false;
let currentFacing = 'environment';

const zoomLevels = [0.5,1,2,3,4,5,6,7,8];
let currentZoom = 1;

let supportsTrackZoom = false;

let swipeStartX = 0;
let swipeStartY = 0;
let swipeLocked = false;

const memoryItems = [];

function showMessage(text, ms = 1800){
  messageBox.textContent = text;
  messageBox.classList.add('show');

  clearTimeout(showMessage._t);

  showMessage._t = setTimeout(()=>{
    messageBox.classList.remove('show');
  }, ms);
}

function updateMemoryButton(){
  memorySaveBtn.textContent = `メモリ保存 ${memoryItems.length}`;
}

function formatZoom(z){
  return Number.isInteger(z)
    ? String(z)
    : z.toFixed(1).replace(/\.0$/, '');
}

function updateZoomUI(){
  zoomPill.textContent = `x${formatZoom(currentZoom)}`;
}

async function applyHardwareZoom(value){
  if(!activeTrack || !supportsTrackZoom) return false;

  try{
    await activeTrack.applyConstraints({
      advanced:[{ zoom:value }]
    });

    return true;
  }catch(e){
    return false;
  }
}

async function setZoom(value){

  currentZoom = value;

  updateZoomUI();

  const ok = await applyHardwareZoom(value);

  if(!ok){
    video.style.transform = `scale(${value})`;
  }else{
    video.style.transform = 'none';
  }
}

function getNextZoom(direction){

  const idx = zoomLevels.findIndex(v => v === currentZoom);

  if(direction === 'up'){
    return zoomLevels[Math.min(idx + 1, zoomLevels.length - 1)];
  }

  return zoomLevels[Math.max(idx - 1, 0)];
}

function toggleSwap(){

  swapped = !swapped;

  if(swapped){

    videoBtn.style.left =
      `calc(100% - var(--side) - var(--btn))`;

    photoBtn.style.left =
      `var(--side)`;

  }else{

    videoBtn.style.left =
      `var(--side)`;

    photoBtn.style.left =
      `calc(100% - var(--side) - var(--btn))`;
  }
}

function formatDate(){

  const d = new Date();

  const pad = n => String(n).padStart(2,'0');

  return (
    d.getFullYear() +
    pad(d.getMonth()+1) +
    pad(d.getDate()) + '_' +
    pad(d.getHours()) +
    pad(d.getMinutes()) +
    pad(d.getSeconds())
  );
}

function addToMemory(kind, blob, filename){

  memoryItems.push({
    kind,
    blob,
    filename,
    type:blob.type
  });

  updateMemoryButton();
}

function clearMemory(){
  memoryItems.length = 0;
  updateMemoryButton();
}

function drawVideoFrame(){

  const ctx =
    hiddenCanvas.getContext('2d');

  const vw = video.videoWidth;
  const vh = video.videoHeight;

  hiddenCanvas.width = vw;
  hiddenCanvas.height = vh;

  if(currentZoom <= 1){

    ctx.drawImage(video,0,0,vw,vh);
    return;
  }

  const cropW = vw / currentZoom;
  const cropH = vh / currentZoom;

  const sx = (vw - cropW)/2;
  const sy = (vh - cropH)/2;

  ctx.drawImage(
    video,
    sx, sy,
    cropW, cropH,
    0, 0,
    vw, vh
  );
}

async function capturePhoto(){

  drawVideoFrame();

  hiddenCanvas.toBlob(blob=>{

    const filename =
      `photo_${formatDate()}.jpg`;

    addToMemory(
      'photo',
      blob,
      filename
    );

    showMessage('写真をメモリに保存した');

  }, 'image/jpeg', 1);
}

function getBestMimeType(){

  if(!window.MediaRecorder) return '';

  const candidates = [
    'video/mp4',
    'video/mp4;codecs=h264,aac',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];

  for(const type of candidates){

    try{
      if(MediaRecorder.isTypeSupported(type)){
        return type;
      }
    }catch(e){}
  }

  return '';
}

function startRecording(){

  if(isRecording) return;

  const mimeType = getBestMimeType();

  mediaRecorder =
    mimeType
      ? new MediaRecorder(stream, { mimeType })
      : new MediaRecorder(stream);

  recordedChunks = [];

  mediaRecorder.ondataavailable = e=>{

    if(e.data && e.data.size > 0){
      recordedChunks.push(e.data);
    }
  };

  mediaRecorder.onstop = ()=>{

    const type =
      mediaRecorder.mimeType || 'video/webm';

    const blob =
      new Blob(recordedChunks, { type });

    const ext =
      type.includes('mp4')
        ? 'mp4'
        : 'webm';

    const filename =
      `video_${formatDate()}.${ext}`;

    addToMemory(
      'video',
      blob,
      filename
    );

    showMessage('動画をメモリに保存した');
  };

  mediaRecorder.start();

  isRecording = true;

  videoBtn.classList.add('recording');

  showMessage('録画開始');
}

function stopRecording(){

  if(!isRecording) return;

  mediaRecorder.stop();

  isRecording = false;

  videoBtn.classList.remove('recording');

  showMessage('録画停止');
}

function toggleRecording(){

  if(isRecording){
    stopRecording();
  }else{
    startRecording();
  }
}

async function stopStream(){

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
}

async function startCamera(facingMode='environment'){

  await stopStream();

  stream =
    await navigator.mediaDevices.getUserMedia({
      video:{
        facingMode:{ ideal:facingMode },
        width:{ ideal:1920 },
        height:{ ideal:1080 }
      },
      audio:true
    });

  video.srcObject = stream;

  await video.play();

  activeTrack =
    stream.getVideoTracks()[0];

  supportsTrackZoom = false;

  if(activeTrack.getCapabilities){

    const cap =
      activeTrack.getCapabilities();

    supportsTrackZoom =
      typeof cap.zoom !== 'undefined';
  }

  await setZoom(currentZoom);
}

async function switchCamera(){

  if(isRecording){
    stopRecording();
  }

  currentFacing =
    currentFacing === 'environment'
      ? 'user'
      : 'environment';

  await startCamera(currentFacing);
}

async function saveMemory(){

  if(!memoryItems.length){
    showMessage('保存するものがない');
    return;
  }

  const files = memoryItems.map(item=>{

    return new File(
      [item.blob],
      item.filename,
      {
        type:item.type
      }
    );
  });

  try{

    if(
      navigator.canShare &&
      navigator.canShare({ files }) &&
      navigator.share
    ){

      await navigator.share({
        files,
        title:'Camera Memory'
      });

      clearMemory();

      showMessage('保存した');
      return;
    }

  }catch(e){
    console.log(e);
  }

  // fallback

  for(const item of memoryItems){

    const url =
      URL.createObjectURL(item.blob);

    const a =
      document.createElement('a');

    a.href = url;
    a.download = item.filename;

    document.body.appendChild(a);

    a.click();

    a.remove();

    setTimeout(()=>{
      URL.revokeObjectURL(url);
    },3000);
  }

  clearMemory();

  showMessage('保存開始');
}

gestureLayer.addEventListener('pointerdown', e=>{

  swipeLocked = false;

  swipeStartX = e.clientX;
  swipeStartY = e.clientY;
});

gestureLayer.addEventListener('pointermove', async e=>{

  if(swipeLocked) return;

  const dx =
    e.clientX - swipeStartX;

  const dy =
    e.clientY - swipeStartY;

  if(Math.abs(dx) < 16 &&
     Math.abs(dy) < 16){
    return;
  }

  // 縦スワイプ → ズーム

  if(Math.abs(dy) > Math.abs(dx)){

    swipeLocked = true;

    const dir =
      dy < 0 ? 'up' : 'down';

    const next =
      getNextZoom(dir);

    await setZoom(next);

    return;
  }

  // 横スワイプ → 左右交換

  if(Math.abs(dx) > 50){

    swipeLocked = true;

    toggleSwap();
  }
});

zoomPill.addEventListener('click', ()=>{
  setZoom(1);
});

photoBtn.addEventListener('click', capturePhoto);

videoBtn.addEventListener('click', toggleRecording);

switchBtn.addEventListener('click', switchCamera);

memorySaveBtn.addEventListener('click', saveMemory);

window.addEventListener('beforeunload', ()=>{

  if(mediaRecorder &&
     mediaRecorder.state === 'recording'){
    mediaRecorder.stop();
  }

  if(stream){
    stream.getTracks().forEach(t=>t.stop());
  }
});

updateMemoryButton();
updateZoomUI();

startCamera(currentFacing);
</script>

</body>
</html>
