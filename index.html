<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --bar-h: 170px;
      --btn: 84px;
      --mini-btn: 38px;
      --side: 18px;
      --swap-dur: 320ms;
      --ui: rgba(255,255,255,.10);
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app{
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #000;
    }

    #viewport{
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #preview{
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
      touch-action: none;
    }

    #gestureLayer{
      position: absolute;
      inset: 0;
      z-index: 5;
      touch-action: none;
    }

    #topHud{
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 10;
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.42);
      color: #fff;
      font-size: 13px;
      letter-spacing: .03em;
      border: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    #zoomPill{
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #zoomPill.show{
      opacity: 1;
      transform: translateY(0);
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.68);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #controls{
      position: relative;
      height: var(--bar-h);
      background: #000;
      border-top: 1px solid rgba(255,255,255,.06);
      overflow: hidden;
    }

    #albumBar{
      height: 58px;
      padding: 8px 10px 0;
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }

    #albumBar::-webkit-scrollbar{
      display: none;
    }

    .thumb{
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      border-radius: 10px;
      object-fit: cover;
      background: #111;
      border: 1px solid rgba(255,255,255,.12);
    }

    .albumHint{
      flex: 0 0 auto;
      color: rgba(255,255,255,.45);
      font-size: 12px;
      padding: 0 4px 0 2px;
      white-space: nowrap;
    }

    #mainRow{
      position: relative;
      height: calc(var(--bar-h) - 58px);
    }

    .controlBtn{
      position: absolute;
      bottom: 18px;
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 3;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        right var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.42);
      touch-action: manipulation;
    }

    .controlBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.42);
    }

    #photoBtn{
      right: var(--side);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.42);
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.44), 0 8px 22px rgba(0,0,0,.42); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.42); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.42); }
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording .innerDot{
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #centerTools{
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 4;
    }

    .miniBtn{
      width: var(--mini-btn);
      height: var(--mini-btn);
      border: none;
      border-radius: 50%;
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: 0 6px 14px rgba(0,0,0,.30);
      touch-action: manipulation;
      padding: 0;
    }

    .miniBtn:active{
      transform: scale(.94);
    }

    #swapBtn{
      font-size: 17px;
    }

    #flipBtn{
      font-size: 16px;
    }

    #hiddenCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <canvas id="preview"></canvas>
      <div id="gestureLayer"></div>

      <div id="topHud">
        <div class="pill" id="recPill">LIVE</div>
      </div>

      <div class="pill" id="zoomPill">x1</div>
      <div id="message"></div>
    </div>

    <div id="controls">
      <div id="albumBar">
        <div class="albumHint">写真</div>
      </div>

      <div id="mainRow">
        <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
          <span class="innerDot"></span>
        </button>

        <div id="centerTools">
          <button id="swapBtn" class="miniBtn" aria-label="左右のボタンを入れ替え">↔</button>
          <button id="flipBtn" class="miniBtn" aria-label="前後カメラを切り替え">⟲</button>
        </div>

        <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
          <span class="innerDot"></span>
        </button>
      </div>
    </div>

    <canvas id="hiddenCanvas"></canvas>
  </div>

  <script>
    const preview = document.getElementById('preview');
    const gestureLayer = document.getElementById('gestureLayer');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const swapBtn = document.getElementById('swapBtn');
    const flipBtn = document.getElementById('flipBtn');
    const zoomPill = document.getElementById('zoomPill');
    const recPill = document.getElementById('recPill');
    const messageBox = document.getElementById('message');
    const albumBar = document.getElementById('albumBar');
    const hiddenCanvas = document.getElementById('hiddenCanvas');

    const pctx = preview.getContext('2d');
    const photoCtx = hiddenCanvas.getContext('2d');

    let stream = null;
    let videoEl = document.createElement('video');
    videoEl.autoplay = true;
    videoEl.playsInline = true;
    videoEl.muted = true;

    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let currentFacing = 'environment';
    let swapped = false;

    const zoomLevels = [0.5, 1, 2, 3, 4, 5, 6, 7, 8];
    let zoomIndex = 1;
    let currentZoom = zoomLevels[zoomIndex];

    const MAX_PHOTOS = 24;
    let photos = [];

    let renderRunning = true;
    let recordStream = null;

    function showMessage(text, ms = 2200){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function showZoom(){
      zoomPill.textContent = `x${currentZoom}`;
      zoomPill.classList.add('show');
      clearTimeout(showZoom._t);
      showZoom._t = setTimeout(() => zoomPill.classList.remove('show'), 900);
    }

    function updateZoom(){
      showZoom();
    }

    function toggleSwap(){
      swapped = !swapped;

      if (swapped){
        videoBtn.style.left = 'auto';
        videoBtn.style.right = 'var(--side)';
        photoBtn.style.right = 'auto';
        photoBtn.style.left = 'var(--side)';
      }else{
        videoBtn.style.right = 'auto';
        videoBtn.style.left = 'var(--side)';
        photoBtn.style.left = 'auto';
        photoBtn.style.right = 'var(--side)';
      }
    }

    function stopStream(){
      if (stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
    }

    async function startCamera(){
      if (isRecording){
        stopRecording();
      }

      stopStream();

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacing },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        videoEl.srcObject = stream;
        await videoEl.play();

        showMessage(currentFacing === 'environment' ? '外カメラ' : '内カメラ', 1000);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    function resizeCanvas(){
      const rect = preview.getBoundingClientRect();
      const dpr = Math.max(1, window.devicePixelRatio || 1);
      preview.width = Math.floor(rect.width * dpr);
      preview.height = Math.floor(rect.height * dpr);
    }

    function drawFrame(){
      if (!renderRunning) return;

      if (preview.width === 0 || preview.height === 0){
        resizeCanvas();
      }

      const cw = preview.width;
      const ch = preview.height;
      pctx.fillStyle = '#000';
      pctx.fillRect(0, 0, cw, ch);

      if (videoEl.readyState >= 2 && videoEl.videoWidth && videoEl.videoHeight){
        const vw = videoEl.videoWidth;
        const vh = videoEl.videoHeight;

        if (currentZoom >= 1){
          let cropW = vw / currentZoom;
          let cropH = vh / currentZoom;

          const targetAspect = cw / ch;
          const cropAspect = cropW / cropH;

          if (cropAspect > targetAspect){
            cropW = cropH * targetAspect;
          }else{
            cropH = cropW / targetAspect;
          }

          const sx = (vw - cropW) / 2;
          const sy = (vh - cropH) / 2;
          pctx.drawImage(videoEl, sx, sy, cropW, cropH, 0, 0, cw, ch);
        }else{
          const drawW = cw * currentZoom;
          const drawH = ch * currentZoom;
          const dx = (cw - drawW) / 2;
          const dy = (ch - drawH) / 2;
          pctx.drawImage(videoEl, 0, 0, vw, vh, dx, dy, drawW, drawH);
        }
      }else{
        pctx.fillStyle = '#111';
        pctx.fillRect(0, 0, cw, ch);
      }

      requestAnimationFrame(drawFrame);
    }

    function getBestMimeType(){
      if (!window.MediaRecorder) return '';
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const type of candidates){
        try{
          if (MediaRecorder.isTypeSupported(type)) return type;
        }catch(e){}
      }
      return '';
    }

    function formatDate(){
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        pad(d.getMonth() + 1) +
        pad(d.getDate()) + '_' +
        pad(d.getHours()) +
        pad(d.getMinutes()) +
        pad(d.getSeconds())
      );
    }

    function renderAlbum(){
      albumBar.querySelectorAll('.thumb').forEach(el => el.remove());

      photos.slice().reverse().forEach(src => {
        const img = document.createElement('img');
        img.className = 'thumb';
        img.src = src;
        img.alt = '撮った写真';
        img.addEventListener('click', () => {
          const w = window.open('');
          if (w) {
            w.document.write(`
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>写真</title>
              <style>
                html,body{margin:0;height:100%;background:#000;display:grid;place-items:center}
                img{max-width:100vw;max-height:100vh;object-fit:contain}
              </style>
              <img src="${src}">
            `);
          }
        });
        albumBar.appendChild(img);
      });
    }

    function loadAlbum(){
      try{
        const saved = localStorage.getItem('camera_album_v1');
        if (saved){
          const arr = JSON.parse(saved);
          if (Array.isArray(arr)){
            photos = arr.filter(x => typeof x === 'string');
          }
        }
      }catch(e){}
      renderAlbum();
    }

    function saveAlbum(){
      try{
        localStorage.setItem('camera_album_v1', JSON.stringify(photos.slice(-MAX_PHOTOS)));
      }catch(e){}
    }

    function capturePhoto(){
      if (!videoEl.videoWidth || !videoEl.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const vw = videoEl.videoWidth;
      const vh = videoEl.videoHeight;
      const maxSide = 1280;

      let outW = vw;
      let outH = vh;
      if (outW > outH && outW > maxSide){
        outH = Math.round(outH * (maxSide / outW));
        outW = maxSide;
      }else if (outH >= outW && outH > maxSide){
        outW = Math.round(outW * (maxSide / outH));
        outH = maxSide;
      }

      hiddenCanvas.width = outW;
      hiddenCanvas.height = outH;

      if (currentZoom >= 1){
        let cropW = vw / currentZoom;
        let cropH = vh / currentZoom;
        const targetAspect = outW / outH;
        const cropAspect = cropW / cropH;

        if (cropAspect > targetAspect){
          cropW = cropH * targetAspect;
        }else{
          cropH = cropW / targetAspect;
        }

        const sx = (vw - cropW) / 2;
        const sy = (vh - cropH) / 2;
        photoCtx.drawImage(videoEl, sx, sy, cropW, cropH, 0, 0, outW, outH);
      }else{
        const drawW = outW * currentZoom;
        const drawH = outH * currentZoom;
        const dx = (outW - drawW) / 2;
        const dy = (outH - drawH) / 2;
        photoCtx.fillStyle = '#000';
        photoCtx.fillRect(0, 0, outW, outH);
        photoCtx.drawImage(videoEl, 0, 0, vw, vh, dx, dy, drawW, drawH);
      }

      const dataUrl = hiddenCanvas.toDataURL('image/jpeg', 0.92);
      photos.push(dataUrl);
      if (photos.length > MAX_PHOTOS) photos = photos.slice(-MAX_PHOTOS);
      saveAlbum();
      renderAlbum();
      showMessage('写真を写真欄に入れたよ', 1100);
    }

    function startRecording(){
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      const mimeType = getBestMimeType();

      try{
        const streamToRecord = preview.captureStream ? preview.captureStream(30) : null;
        if (!streamToRecord){
          showMessage('録画用ストリームを作れなかった');
          return;
        }

        recordStream = streamToRecord;
        mediaRecorder = mimeType ? new MediaRecorder(recordStream, { mimeType }) : new MediaRecorder(recordStream);
      }catch(err){
        console.error(err);
        showMessage('動画録画を開始できなかった');
        return;
      }

      recordedChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const type = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
        const blob = new Blob(recordedChunks, { type });
        if (blob.size > 0){
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `video_${formatDate()}.webm`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          setTimeout(() => URL.revokeObjectURL(url), 2000);
          showMessage('動画を保存したよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        recPill.textContent = 'REC';
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;

      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }

      isRecording = false;
      videoBtn.classList.remove('recording');
      recPill.textContent = 'LIVE';
      showMessage('録画ストップ', 1000);
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    async function toggleFacing(){
      currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
      await startCamera();
    }

    function setZoomByIndex(nextIndex){
      const clamped = Math.max(0, Math.min(zoomLevels.length - 1, nextIndex));
      if (clamped === zoomIndex) return;
      zoomIndex = clamped;
      currentZoom = zoomLevels[zoomIndex];
      updateZoom();
    }

    function zoomStepBySwipe(dy){
      const steps = Math.floor(Math.abs(dy) / 70);
      if (steps <= 0) return;

      if (dy < 0){
        setZoomByIndex(zoomIndex + steps);
      }else{
        setZoomByIndex(zoomIndex - steps);
      }
    }

    let swipeStartX = 0;
    let swipeStartY = 0;
    let swipeMode = null;
    let swipeLocked = false;

    gestureLayer.addEventListener('pointerdown', (e) => {
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
      swipeMode = 'zoom';
      swipeLocked = false;
      gestureLayer.setPointerCapture(e.pointerId);
    });

    gestureLayer.addEventListener('pointermove', (e) => {
      if (swipeMode !== 'zoom' || swipeLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;

      if (Math.abs(dy) > Math.abs(dx)){
        swipeLocked = true;
        zoomStepBySwipe(dy);
        swipeMode = null;
      }
    });

    gestureLayer.addEventListener('pointerup', () => {
      swipeMode = null;
      swipeLocked = false;
    });

    gestureLayer.addEventListener('pointercancel', () => {
      swipeMode = null;
      swipeLocked = false;
    });

    swapBtn.addEventListener('click', toggleSwap);
    flipBtn.addEventListener('click', toggleFacing);
    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);

    window.addEventListener('resize', resizeCanvas);

    window.addEventListener('beforeunload', () => {
      renderRunning = false;
      if (isRecording){
        try { mediaRecorder.stop(); } catch(e) {}
      }
      stopStream();
    });

    loadAlbum();
    resizeCanvas();
    updateZoom();
    startCamera();
    drawFrame();
  </script>
</body>
</html>
