<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --panel-h-collapsed: 132px;
      --panel-h-expanded: 318px;
      --btn: 86px;
      --small-btn: 46px;
      --side: 18px;
      --swap-dur: 360ms;
      --zoom-dur: 180ms;
      --safe-b: env(safe-area-inset-bottom);
      --safe-t: env(safe-area-inset-top);
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      overscroll-behavior: none;
    }

    body{
      position: fixed;
      inset: 0;
    }

    #shell{
      position: fixed;
      top: 0;
      left: 0;
      transform-origin: top left;
      overflow: hidden;
      background: #000;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #viewport{
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #previewCanvas{
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    #cameraSource{
      display: none;
    }

    #gestureLayer{
      position: absolute;
      inset: 0;
      z-index: 8;
      touch-action: none;
    }

    #topHud{
      position: absolute;
      top: calc(12px + var(--safe-t));
      left: 12px;
      right: 12px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: flex-end;
      gap: 8px;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      pointer-events: auto;
    }

    .pillButton{
      cursor: pointer;
    }

    #zoomPill{
      position: absolute;
      top: calc(12px + var(--safe-t));
      left: 12px;
      z-index: 21;
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    #zoomPill.flash{
      transform: scale(1.08);
    }

    #controls{
      position: relative;
      height: var(--panel-h-collapsed);
      background: rgba(0,0,0,.58);
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.06);
      padding-bottom: var(--safe-b);
      transition: height 240ms ease, background 240ms ease;
    }

    #controls.expanded{
      height: var(--panel-h-expanded);
      background: rgba(0,0,0,.68);
    }

    #settingsPanel{
      position: absolute;
      top: 22px;
      left: 0;
      right: 0;
      z-index: 2;
      padding: 10px 14px 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      transform: translateY(14px);
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #controls.expanded #settingsPanel{
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .settingBtn{
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.08);
      color: #fff;
      border-radius: 14px;
      min-width: 92px;
      padding: 12px 14px;
      font-size: 14px;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(0,0,0,.22);
      touch-action: manipulation;
    }

    .settingBtn:active{
      transform: scale(.96);
    }

    .settingBtn.active{
      background: rgba(255,255,255,.22);
    }

    .settingBtn.wide{
      min-width: 140px;
    }

    .controlBtn{
      position: absolute;
      bottom: calc(22px + var(--safe-b));
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 4;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.4);
      touch-action: manipulation;
    }

    .controlBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #photoBtn{
      left: calc(100% - var(--side) - var(--btn));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #switchBtn{
      position: absolute;
      left: 50%;
      bottom: calc(31px + var(--safe-b));
      transform: translateX(-50%);
      width: var(--small-btn);
      height: var(--small-btn);
      border-radius: 50%;
      border: none;
      z-index: 5;
      background: rgba(255,255,255,.10);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      touch-action: manipulation;
    }

    #switchBtn:active{
      transform: translateX(-50%) scale(.94);
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.45), 0 8px 22px rgba(0,0,0,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording .innerDot{
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 30;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.68);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #hiddenCaptureCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="shell">
    <div id="app">
      <div id="viewport">
        <canvas id="previewCanvas"></canvas>
        <video id="cameraSource" autoplay playsinline muted></video>
        <div id="gestureLayer"></div>

        <div id="topHud">
          <div></div>
          <div class="pill pillButton" id="memorySaveBtn">メモリ保存 0</div>
        </div>

        <div class="pill" id="zoomPill">x1</div>
        <div id="message"></div>
      </div>

      <div id="controls">
        <div id="settingsPanel">
          <button class="settingBtn" id="aspect34Btn">3:4</button>
          <button class="settingBtn" id="aspect916Btn">9:16</button>
          <button class="settingBtn" id="aspect11Btn">1:1</button>
          <button class="settingBtn wide" id="rotateFollowBtn">縦横切替 ON</button>
          <button class="settingBtn wide" id="micToggleBtn">マイク ON</button>
        </div>

        <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
          <span class="innerDot"></span>
        </button>

        <button id="switchBtn" aria-label="前後カメラを切り替え">⇄</button>

        <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
          <span class="innerDot"></span>
        </button>
      </div>

      <canvas id="hiddenCaptureCanvas"></canvas>
    </div>
  </div>

  <script>
    const shell = document.getElementById('shell');
    const app = document.getElementById('app');
    const viewport = document.getElementById('viewport');

    const cameraSource = document.getElementById('cameraSource');
    const previewCanvas = document.getElementById('previewCanvas');
    const previewCtx = previewCanvas.getContext('2d', { alpha: false });

    const hiddenCaptureCanvas = document.getElementById('hiddenCaptureCanvas');
    const hiddenCaptureCtx = hiddenCaptureCanvas.getContext('2d', { alpha: false });

    const gestureLayer = document.getElementById('gestureLayer');
    const controls = document.getElementById('controls');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const switchBtn = document.getElementById('switchBtn');
    const zoomPill = document.getElementById('zoomPill');
    const messageBox = document.getElementById('message');
    const memorySaveBtn = document.getElementById('memorySaveBtn');

    const aspect34Btn = document.getElementById('aspect34Btn');
    const aspect916Btn = document.getElementById('aspect916Btn');
    const aspect11Btn = document.getElementById('aspect11Btn');
    const rotateFollowBtn = document.getElementById('rotateFollowBtn');
    const micToggleBtn = document.getElementById('micToggleBtn');

    const ASPECTS = {
      '3:4': 3 / 4,
      '9:16': 9 / 16,
      '1:1': 1
    };

    const VIDEO_SHORT_SIDE = 1920;
    const PHOTO_SHORT_SIDE = 1920;

    let selectedAspect = '9:16';
    let followDeviceRotation = true;
    let micEnabled = true;
    let panelExpanded = false;

    let videoStream = null;
    let micStream = null;
    let micTrack = null;

    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let currentFacing = 'environment';

    const zoomLevels = [0.5, 1, 2, 3, 4, 5, 6, 7, 8];
    let currentZoom = 1;

    let activeTrack = null;
    let supportsTrackZoom = false;
    let hardwareZoomAvailable = false;
    let hardwareZoomMin = 1;
    let hardwareZoomMax = 1;
    let hardwareZoomUsed = false;
    let trackZoomValue = 1;

    let controlsSwipeActive = false;
    let controlsSwipeLocked = false;
    let gestureActive = false;
    let gestureLocked = false;
    let swipeStartX = 0;
    let swipeStartY = 0;

    const memoryItems = [];

    function showMessage(text, ms = 2200){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function flashZoom(){
      zoomPill.classList.add('flash');
      clearTimeout(flashZoom._t);
      flashZoom._t = setTimeout(() => zoomPill.classList.remove('flash'), 160);
    }

    function formatZoom(z){
      return Number.isInteger(z) ? String(z) : z.toFixed(1).replace(/\.0$/, '');
    }

    function getDeviceAngle(){
      let angle = 0;
      if (screen.orientation && typeof screen.orientation.angle === 'number'){
        angle = screen.orientation.angle;
      }else if (typeof window.orientation === 'number'){
        angle = window.orientation;
      }
      angle = ((angle % 360) + 360) % 360;
      return angle;
    }

    function getAspectRatioValue(){
      return ASPECTS[selectedAspect] || ASPECTS['9:16'];
    }

    function getCaptureSize(mode = 'video'){
      const shortSide = mode === 'photo' ? PHOTO_SHORT_SIDE : VIDEO_SHORT_SIDE;
      const ratio = getAspectRatioValue();

      return {
        width: Math.round(shortSide * ratio),
        height: shortSide
      };
    }

    function resizeCanvases(){
      const dpr = Math.max(1, window.devicePixelRatio || 1);

      const previewW = Math.max(1, Math.round(viewport.clientWidth * dpr));
      const previewH = Math.max(1, Math.round(viewport.clientHeight * dpr));

      if (previewCanvas.width !== previewW || previewCanvas.height !== previewH){
        previewCanvas.width = previewW;
        previewCanvas.height = previewH;
      }

      const videoSize = getCaptureSize('video');
      const photoSize = getCaptureSize('photo');

      if (hiddenCaptureCanvas.width !== videoSize.width || hiddenCaptureCanvas.height !== videoSize.height){
        hiddenCaptureCanvas.width = videoSize.width;
        hiddenCaptureCanvas.height = videoSize.height;
      }

      // 写真も同じ比率・同じ基準で使う
      hiddenCaptureCanvas.dataset.photoWidth = String(photoSize.width);
      hiddenCaptureCanvas.dataset.photoHeight = String(photoSize.height);
    }

    function getRenderZoom(){
      return hardwareZoomUsed ? 1 : currentZoom;
    }

    function drawFrameToCanvas(ctx, canvas, rotateForMedia){
      const cw = canvas.width;
      const ch = canvas.height;

      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, cw, ch);

      if (!cameraSource.videoWidth || !cameraSource.videoHeight){
        return;
      }

      const rotationDeg = rotateForMedia && followDeviceRotation ? getDeviceAngle() : 0;
      const rad = rotationDeg * Math.PI / 180;
      const quarterTurn = rotationDeg === 90 || rotationDeg === 270;

      const srcW = cameraSource.videoWidth;
      const srcH = cameraSource.videoHeight;
      const effectiveW = quarterTurn ? srcH : srcW;
      const effectiveH = quarterTurn ? srcW : srcH;

      const zoom = getRenderZoom();

      const baseScale = zoom >= 1
        ? Math.max(cw / effectiveW, ch / effectiveH)
        : Math.min(cw / effectiveW, ch / effectiveH);

      const scale = baseScale * zoom;
      const drawW = srcW * scale;
      const drawH = srcH * scale;

      ctx.save();
      ctx.translate(cw / 2, ch / 2);
      ctx.rotate(rad);
      ctx.drawImage(cameraSource, -drawW / 2, -drawH / 2, drawW, drawH);
      ctx.restore();
    }

    function drawPreview(){
      drawFrameToCanvas(previewCtx, previewCanvas, false);
    }

    function drawCaptureFrame(){
      drawFrameToCanvas(hiddenCaptureCtx, hiddenCaptureCanvas, true);
    }

    function renderLoop(){
      drawPreview();
      drawCaptureFrame();
      requestAnimationFrame(renderLoop);
    }

    function updateZoomLabel(){
      zoomPill.textContent = `x${formatZoom(currentZoom)}`;
      flashZoom();
    }

    async function applyHardwareZoom(value){
      if (!activeTrack || !supportsTrackZoom) return false;

      try{
        await activeTrack.applyConstraints({
          advanced: [{ zoom: value }]
        });
        return true;
      }catch(err){
        return false;
      }
    }

    async function setZoom(nextZoom){
      const clamped = Math.max(zoomLevels[0], Math.min(zoomLevels[zoomLevels.length - 1], nextZoom));
      if (Math.abs(clamped - currentZoom) < 0.001) return;

      currentZoom = clamped;
      updateZoomLabel();

      const inHardwareRange = hardwareZoomAvailable &&
        currentZoom >= hardwareZoomMin &&
        currentZoom <= hardwareZoomMax;

      if (inHardwareRange){
        const ok = await applyHardwareZoom(currentZoom);
        if (ok){
          hardwareZoomUsed = true;
          trackZoomValue = currentZoom;
          return;
        }
      }

      if (trackZoomValue !== 1){
        await applyHardwareZoom(1);
        trackZoomValue = 1;
      }

      hardwareZoomUsed = false;
    }

    function toggleSwap(){
      toggleSwap.state = !toggleSwap.state;

      if (toggleSwap.state){
        videoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
        photoBtn.style.left = `var(--side)`;
      }else{
        videoBtn.style.left = `var(--side)`;
        photoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
      }
    }
    toggleSwap.state = false;

    function setPanelExpanded(expanded){
      panelExpanded = expanded;
      controls.classList.toggle('expanded', expanded);
    }

    function updateMemoryButton(){
      memorySaveBtn.textContent = `メモリ保存 ${memoryItems.length}`;
    }

    function addToMemory(kind, blob, filename){
      memoryItems.push({
        kind,
        blob,
        filename,
        type: blob.type || ''
      });
      updateMemoryButton();
    }

    function clearMemory(){
      memoryItems.length = 0;
      updateMemoryButton();
    }

    function pickRecorderFormat(){
      if (!window.MediaRecorder) return { mimeType: '', ext: 'webm' };

      const candidates = [
        { mimeType: 'video/mp4', ext: 'mp4' },
        { mimeType: 'video/mp4;codecs=h264,aac', ext: 'mp4' },
        { mimeType: 'video/webm;codecs=vp9,opus', ext: 'webm' },
        { mimeType: 'video/webm;codecs=vp8,opus', ext: 'webm' },
        { mimeType: 'video/webm;codecs=vp9', ext: 'webm' },
        { mimeType: 'video/webm;codecs=vp8', ext: 'webm' },
        { mimeType: 'video/webm', ext: 'webm' }
      ];

      for (const item of candidates){
        try{
          if (MediaRecorder.isTypeSupported(item.mimeType)) return item;
        }catch(e){}
      }

      return { mimeType: '', ext: 'webm' };
    }

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    async function saveMemory(){
      if (!memoryItems.length){
        showMessage('保存するものがまだないよ');
        return;
      }

      const files = memoryItems.map(item => new File([item.blob], item.filename, {
        type: item.type || item.blob.type || 'application/octet-stream'
      }));

      try{
        if (navigator.canShare && navigator.share && navigator.canShare({ files })){
          await navigator.share({
            files,
            title: 'Camera Memory',
            text: '保存した写真と動画'
          });
          clearMemory();
          showMessage('メモリから保存したよ', 1600);
          return;
        }
      }catch(err){
        console.log('share failed', err);
      }

      for (const item of memoryItems){
        downloadBlob(item.blob, item.filename);
        await new Promise(r => setTimeout(r, 140));
      }
      clearMemory();
      showMessage('保存を開始したよ', 1600);
    }

    async function ensureMicStream(){
      if (micStream) return micStream;

      try{
        micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          },
          video: false
        });

        micTrack = micStream.getAudioTracks()[0] || null;
        if (micTrack){
          micTrack.enabled = micEnabled;
        }
        return micStream;
      }catch(err){
        console.error(err);
        micStream = null;
        micTrack = null;
        micEnabled = false;
        updateSettingButtons();
        showMessage('マイク許可が取れなかったよ');
        return null;
      }
    }

    async function startVideoStream(facingMode = 'environment'){
      if (videoStream){
        videoStream.getTracks().forEach(t => t.stop());
        videoStream = null;
      }

      try{
        videoStream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        cameraSource.srcObject = videoStream;
        await cameraSource.play();

        const tracks = videoStream.getVideoTracks();
        activeTrack = tracks && tracks[0] ? tracks[0] : null;

        supportsTrackZoom = false;
        hardwareZoomAvailable = false;
        hardwareZoomMin = 1;
        hardwareZoomMax = 1;

        if (activeTrack && activeTrack.getCapabilities){
          const cap = activeTrack.getCapabilities();
          supportsTrackZoom = typeof cap.zoom !== 'undefined';

          if (supportsTrackZoom && cap.zoom){
            hardwareZoomAvailable = true;
            hardwareZoomMin = typeof cap.zoom.min === 'number' ? cap.zoom.min : 1;
            hardwareZoomMax = typeof cap.zoom.max === 'number' ? cap.zoom.max : 1;
          }
        }

        const ok = await applyHardwareZoom(currentZoom);
        if (ok){
          hardwareZoomUsed = true;
          trackZoomValue = currentZoom;
        }else{
          hardwareZoomUsed = false;
          trackZoomValue = 1;
          await applyHardwareZoom(1);
        }

        resizeCanvases();
        showMessage(facingMode === 'user' ? 'インカメラにしたよ' : '外カメラにしたよ', 1000);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    async function startCamera(facingMode = 'environment'){
      await startVideoStream(facingMode);
      await ensureMicStream();
      applyUiOrientation();
    }

    async function switchCamera(){
      if (isRecording){
        stopRecording();
      }
      currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
      await startVideoStream(currentFacing);
    }

    function getPhotoSize(){
      const shortSide = PHOTO_SHORT_SIDE;
      const ratio = getAspectRatioValue();
      return {
        width: Math.round(shortSide * ratio),
        height: shortSide
      };
    }

    function capturePhoto(){
      if (!cameraSource.videoWidth || !cameraSource.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const photoSize = getPhotoSize();
      if (hiddenCaptureCanvas.width !== photoSize.width || hiddenCaptureCanvas.height !== photoSize.height){
        hiddenCaptureCanvas.width = photoSize.width;
        hiddenCaptureCanvas.height = photoSize.height;
      }

      drawFrameToCanvas(hiddenCaptureCtx, hiddenCaptureCanvas, true);

      hiddenCaptureCanvas.toBlob((blob) => {
        if (!blob){
          showMessage('写真の保存に失敗した');
          return;
        }
        const filename = `photo_${formatDate()}.png`;
        addToMemory('photo', blob, filename);
        showMessage('写真をメモリに入れたよ', 1200);
      }, 'image/png');
    }

    function buildRecordingStream(){
      const canvasStream = hiddenCaptureCanvas.captureStream(30);
      const merged = new MediaStream();

      canvasStream.getVideoTracks().forEach(track => merged.addTrack(track));

      if (micEnabled && micTrack){
        micTrack.enabled = true;
        merged.addTrack(micTrack);
      }

      return merged;
    }

    async function startRecording(){
      if (!videoStream){
        showMessage('カメラの準備がまだだよ');
        return;
      }
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      if (micEnabled && !micTrack){
        await ensureMicStream();
      }

      const format = pickRecorderFormat();
      let recorderStream = null;

      try{
        recorderStream = buildRecordingStream();
        mediaRecorder = format.mimeType
          ? new MediaRecorder(recorderStream, { mimeType: format.mimeType })
          : new MediaRecorder(recorderStream);
      }catch(err){
        console.error(err);
        showMessage('動画録画を開始できなかった');
        return;
      }

      recordedChunks = [];

      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const type = mediaRecorder && mediaRecorder.mimeType
          ? mediaRecorder.mimeType
          : (format.mimeType || 'video/webm');

        const blob = new Blob(recordedChunks, { type });

        if (blob.size > 0){
          const ext = format.ext || (type.includes('mp4') ? 'mp4' : 'webm');
          const filename = `video_${formatDate()}.${ext}`;
          addToMemory('video', blob, filename);
          showMessage('動画をメモリに入れたよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }

        try{
          recorderStream.getTracks().forEach(t => t.stop());
        }catch(e){}
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;

      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }

      isRecording = false;
      videoBtn.classList.remove('recording');
      showMessage('録画ストップ', 1000);
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    function setAspect(aspect){
      selectedAspect = aspect;
      updateSettingButtons();
      resizeCanvases();
      showMessage(`比率を ${aspect} にしたよ`, 900);
    }

    function toggleFollowRotation(){
      followDeviceRotation = !followDeviceRotation;
      updateSettingButtons();
      resizeCanvases();
      showMessage(followDeviceRotation ? '縦横切替 ON' : '縦横切替 OFF', 900);
    }

    async function toggleMic(){
      if (micEnabled){
        micEnabled = false;
        if (micTrack) micTrack.enabled = false;
        updateSettingButtons();
        showMessage('マイク OFF', 900);
        return;
      }

      micEnabled = true;
      if (!micTrack){
        await ensureMicStream();
      }

      if (micTrack){
        micTrack.enabled = true;
        updateSettingButtons();
        showMessage('マイク ON', 900);
      }else{
        micEnabled = false;
        updateSettingButtons();
      }
    }

    function updateSettingButtons(){
      aspect34Btn.classList.toggle('active', selectedAspect === '3:4');
      aspect916Btn.classList.toggle('active', selectedAspect === '9:16');
      aspect11Btn.classList.toggle('active', selectedAspect === '1:1');

      rotateFollowBtn.textContent = followDeviceRotation ? '縦横切替 ON' : '縦横切替 OFF';
      rotateFollowBtn.classList.toggle('active', followDeviceRotation);

      micToggleBtn.textContent = micEnabled ? 'マイク ON' : 'マイク OFF';
      micToggleBtn.classList.toggle('active', micEnabled);
    }

    function applyUiOrientation(){
      const w = window.innerWidth;
      const h = window.innerHeight;
      const landscape = w > h;

      if (landscape){
        shell.style.width = `${h}px`;
        shell.style.height = `${w}px`;
        shell.style.transform = 'rotate(90deg) translateY(-100%)';
      }else{
        shell.style.width = `${w}px`;
        shell.style.height = `${h}px`;
        shell.style.transform = 'none';
      }

      resizeCanvases();
    }

    function getControlsGestureIntent(dx, dy){
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);

      if (ady > 42 && ady > adx){
        return dy < 0 ? 'panel-open' : 'panel-close';
      }

      if (adx > 42 && adx > ady){
        return 'swap';
      }

      return null;
    }

    function getZoomGestureIntent(dx, dy){
      const adx = Math.abs(dx);
      const ady = Math.abs(dy);

      if (ady > adx){
        return dy < 0 ? 'zoom-in' : 'zoom-out';
      }

      return null;
    }

    gestureLayer.addEventListener('pointerdown', (e) => {
      gestureActive = true;
      gestureLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
      gestureLayer.setPointerCapture(e.pointerId);
    });

    gestureLayer.addEventListener('pointermove', async (e) => {
      if (!gestureActive || gestureLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;

      const intent = getZoomGestureIntent(dx, dy);
      if (!intent) return;

      gestureLocked = true;

      if (intent === 'zoom-in'){
        await setZoom(getNextZoom('up'));
      }else if (intent === 'zoom-out'){
        await setZoom(getNextZoom('down'));
      }
    });

    gestureLayer.addEventListener('pointerup', () => {
      gestureActive = false;
      gestureLocked = false;
    });

    gestureLayer.addEventListener('pointercancel', () => {
      gestureActive = false;
      gestureLocked = false;
    });

    function getNextZoom(direction){
      const idx = zoomLevels.findIndex(v => Math.abs(v - currentZoom) < 0.001);
      if (idx !== -1){
        if (direction === 'up') return zoomLevels[Math.min(zoomLevels.length - 1, idx + 1)];
        return zoomLevels[Math.max(0, idx - 1)];
      }

      let nearest = 0;
      let best = Infinity;
      for (let i = 0; i < zoomLevels.length; i++){
        const d = Math.abs(zoomLevels[i] - currentZoom);
        if (d < best){
          best = d;
          nearest = i;
        }
      }

      if (direction === 'up') return zoomLevels[Math.min(zoomLevels.length - 1, nearest + 1)];
      return zoomLevels[Math.max(0, nearest - 1)];
    }

    controls.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;

      controlsSwipeActive = true;
      controlsSwipeLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
    });

    controls.addEventListener('pointermove', (e) => {
      if (!controlsSwipeActive || controlsSwipeLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;

      const intent = getControlsGestureIntent(dx, dy);
      if (!intent) return;

      controlsSwipeLocked = true;

      if (intent === 'panel-open'){
        setPanelExpanded(true);
      }else if (intent === 'panel-close'){
        setPanelExpanded(false);
      }else if (intent === 'swap'){
        toggleSwap();
      }
    });

    controls.addEventListener('pointerup', () => {
      controlsSwipeActive = false;
      controlsSwipeLocked = false;
    });

    controls.addEventListener('pointercancel', () => {
      controlsSwipeActive = false;
      controlsSwipeLocked = false;
    });

    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);
    switchBtn.addEventListener('click', switchCamera);
    memorySaveBtn.addEventListener('click', saveMemory);

    zoomPill.addEventListener('click', async () => {
      await setZoom(1);
      showMessage('ズームを1倍に戻したよ', 900);
    });

    aspect34Btn.addEventListener('click', () => setAspect('3:4'));
    aspect916Btn.addEventListener('click', () => setAspect('9:16'));
    aspect11Btn.addEventListener('click', () => setAspect('1:1'));
    rotateFollowBtn.addEventListener('click', toggleFollowRotation);
    micToggleBtn.addEventListener('click', toggleMic);

    window.addEventListener('resize', applyUiOrientation);
    window.addEventListener('orientationchange', applyUiOrientation);

    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording'){
        try{ mediaRecorder.stop(); }catch(e){}
      }
      if (videoStream){
        videoStream.getTracks().forEach(t => t.stop());
      }
      if (micStream){
        micStream.getTracks().forEach(t => t.stop());
      }
    });

    updateSettingButtons();
    updateMemoryButton();
    updateZoomLabel();
    applyUiOrientation();
    renderLoop();
    startCamera(currentFacing);
  </script>
</body>
</html>
