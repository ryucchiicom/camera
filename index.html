<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Camera App</title>
  <style>
    :root{
      --bar-h: 132px;
      --btn: 86px;
      --small-btn: 46px;
      --side: 18px;
      --swap-dur: 360ms;
      --zoom-dur: 180ms;
    }

    *{
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body{
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }

    #app{
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    #viewport{
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
    }

    #camera{
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      transform-origin: center center;
      transition: transform var(--zoom-dur) ease;
    }

    #gestureLayer{
      position: absolute;
      inset: 0;
      z-index: 5;
      touch-action: none;
    }

    #topHud{
      position: absolute;
      top: 12px;
      left: 12px;
      right: 12px;
      z-index: 10;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      pointer-events: none;
    }

    .pill{
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,.45);
      color: #fff;
      font-size: 13px;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.12);
      pointer-events: auto;
    }

    .pillButton{
      cursor: pointer;
    }

    #zoomPill{
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 11;
      pointer-events: auto;
      opacity: 1;
      transform: translateY(0);
      transition: transform 180ms ease, opacity 180ms ease;
    }

    #zoomPill.flash{
      transform: scale(1.08);
    }

    #controls{
      position: relative;
      height: var(--bar-h);
      background: #000;
      overflow: hidden;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .controlBtn{
      position: absolute;
      bottom: 22px;
      width: var(--btn);
      height: var(--btn);
      border-radius: 50%;
      border: none;
      outline: none;
      z-index: 3;
      transition:
        left var(--swap-dur) cubic-bezier(.2,.9,.2,1),
        transform 120ms ease,
        box-shadow 120ms ease,
        opacity 120ms ease;
      box-shadow: 0 8px 22px rgba(0,0,0,.4);
      touch-action: manipulation;
    }

    .controlBtn:active{
      transform: scale(.94);
    }

    #videoBtn{
      left: var(--side);
      background: #ff2f2f;
      box-shadow: 0 0 0 4px rgba(255,47,47,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #photoBtn{
      left: calc(100% - var(--side) - var(--btn));
      background: #fff;
      box-shadow: 0 0 0 4px rgba(255,255,255,.12), 0 8px 22px rgba(0,0,0,.4);
    }

    #switchBtn{
      position: absolute;
      left: 50%;
      bottom: 31px;
      transform: translateX(-50%);
      width: var(--small-btn);
      height: var(--small-btn);
      border-radius: 50%;
      border: none;
      z-index: 4;
      background: rgba(255,255,255,.10);
      color: #fff;
      font-size: 18px;
      line-height: 1;
      box-shadow: 0 8px 20px rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.12);
      touch-action: manipulation;
    }

    #switchBtn:active{
      transform: translateX(-50%) scale(.94);
    }

    #videoBtn.recording{
      animation: pulse 1s infinite;
    }

    @keyframes pulse{
      0%   { box-shadow: 0 0 0 0 rgba(255,47,47,.45), 0 8px 22px rgba(0,0,0,.4); }
      70%  { box-shadow: 0 0 0 16px rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
      100% { box-shadow: 0 0 0 0 rgba(255,47,47,0), 0 8px 22px rgba(0,0,0,.4); }
    }

    .innerDot{
      position: absolute;
      inset: 0;
      margin: auto;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: transparent;
      transition: all 180ms ease;
    }

    #videoBtn .innerDot{
      width: 28px;
      height: 28px;
      background: #fff;
      border-radius: 10px;
    }

    #videoBtn.recording .innerDot{
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #fff;
    }

    #photoBtn .innerDot{
      width: 24px;
      height: 24px;
      border: 4px solid #111;
      background: transparent;
      border-radius: 50%;
    }

    #message{
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 20;
      max-width: 88%;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(0,0,0,.68);
      color: #fff;
      text-align: center;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid rgba(255,255,255,.10);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease;
    }

    #message.show{
      opacity: 1;
    }

    #hiddenCanvas{
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="viewport">
      <video id="camera" autoplay playsinline muted></video>
      <div id="gestureLayer"></div>

      <div id="topHud">
        <div></div>
        <div class="pill pillButton" id="memorySaveBtn">メモリ保存 0</div>
      </div>

      <div class="pill" id="zoomPill">x1</div>
      <div id="message"></div>
    </div>

    <div id="controls">
      <button id="videoBtn" class="controlBtn" aria-label="動画の開始と停止">
        <span class="innerDot"></span>
      </button>

      <button id="switchBtn" aria-label="前後カメラを切り替え">⇄</button>

      <button id="photoBtn" class="controlBtn" aria-label="写真を撮る">
        <span class="innerDot"></span>
      </button>
    </div>

    <canvas id="hiddenCanvas"></canvas>
  </div>

  <script>
    const video = document.getElementById('camera');
    const viewport = document.getElementById('viewport');
    const gestureLayer = document.getElementById('gestureLayer');
    const controls = document.getElementById('controls');
    const videoBtn = document.getElementById('videoBtn');
    const photoBtn = document.getElementById('photoBtn');
    const switchBtn = document.getElementById('switchBtn');
    const zoomPill = document.getElementById('zoomPill');
    const messageBox = document.getElementById('message');
    const hiddenCanvas = document.getElementById('hiddenCanvas');
    const memorySaveBtn = document.getElementById('memorySaveBtn');

    let stream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;

    let swapped = false;
    let currentFacing = 'environment';

    const zoomLevels = [0.5, 1, 2, 3, 4, 5, 6, 7, 8];
    let currentZoom = 1;

    let activeTrack = null;
    let supportsTrackZoom = false;
    let hardwareZoomMin = 1;
    let hardwareZoomMax = 1;
    let hardwareZoomAvailable = false;

    let swipeStartX = 0;
    let swipeStartY = 0;
    let controlsSwipeActive = false;
    let controlsSwipeLocked = false;

    const memoryItems = []; // { kind, blob, filename, type }

    function showMessage(text, ms = 2200){
      messageBox.textContent = text;
      messageBox.classList.add('show');
      clearTimeout(showMessage._t);
      showMessage._t = setTimeout(() => messageBox.classList.remove('show'), ms);
    }

    function flashZoom(){
      zoomPill.classList.add('flash');
      clearTimeout(flashZoom._t);
      flashZoom._t = setTimeout(() => zoomPill.classList.remove('flash'), 160);
    }

    function formatZoom(z){
      return Number.isInteger(z) ? String(z) : z.toFixed(1).replace(/\.0$/, '');
    }

    function updateZoomVisual(){
      zoomPill.textContent = `x${formatZoom(currentZoom)}`;
      flashZoom();
      if (!hardwareZoomAvailable || currentZoom < hardwareZoomMin || currentZoom > hardwareZoomMax){
        video.style.transform = `scale(${currentZoom})`;
      }else{
        video.style.transform = `none`;
      }
    }

    function getNextZoom(direction){
      const idx = zoomLevels.findIndex(v => Math.abs(v - currentZoom) < 0.001);
      if (idx !== -1){
        if (direction === 'up') return zoomLevels[Math.min(zoomLevels.length - 1, idx + 1)];
        return zoomLevels[Math.max(0, idx - 1)];
      }

      let nearest = 0;
      let best = Infinity;
      for (let i = 0; i < zoomLevels.length; i++){
        const d = Math.abs(zoomLevels[i] - currentZoom);
        if (d < best){
          best = d;
          nearest = i;
        }
      }

      if (direction === 'up') return zoomLevels[Math.min(zoomLevels.length - 1, nearest + 1)];
      return zoomLevels[Math.max(0, nearest - 1)];
    }

    async function applyHardwareZoom(value){
      if (!activeTrack || !supportsTrackZoom) return false;

      try{
        await activeTrack.applyConstraints({
          advanced: [{ zoom: value }]
        });
        return true;
      }catch(err){
        return false;
      }
    }

    async function setZoom(nextZoom){
      const clamped = Math.max(zoomLevels[0], Math.min(zoomLevels[zoomLevels.length - 1], nextZoom));
      if (Math.abs(clamped - currentZoom) < 0.001) return;

      currentZoom = clamped;
      updateZoomVisual();

      const ok = await applyHardwareZoom(currentZoom);
      if (!ok){
        // iPhone側でズーム制御が効かない場合だけ、見た目ズームにフォールバック
        video.style.transform = `scale(${currentZoom})`;
      }else{
        // ハードウェアズームが効くならCSS拡大は外す
        video.style.transform = `none`;
      }
    }

    function toggleSwap(){
      swapped = !swapped;

      if (swapped){
        videoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
        photoBtn.style.left = `var(--side)`;
      }else{
        videoBtn.style.left = `var(--side)`;
        photoBtn.style.left = `calc(100% - var(--side) - var(--btn))`;
      }
    }

    function updateMemoryButton(){
      memorySaveBtn.textContent = `メモリ保存 ${memoryItems.length}`;
    }

    function addToMemory(kind, blob, filename){
      memoryItems.push({
        kind,
        blob,
        filename,
        type: blob.type || ''
      });
      updateMemoryButton();
    }

    function clearMemory(){
      memoryItems.length = 0;
      updateMemoryButton();
    }

    function getBestMimeType(){
  if (!window.MediaRecorder) return '';

  // iPhone優先
  const candidates = [
    'video/mp4;codecs=h264,aac',
    'video/mp4',
    'video/webm;codecs=vp9,opus',
    'video/webm;codecs=vp8,opus',
    'video/webm'
  ];

  for (const type of candidates){
    try{
      if (MediaRecorder.isTypeSupported(type)){
        return type;
      }
    }catch(e){}
  }

  return '';
}
      if (!window.MediaRecorder) return '';
      const candidates = [
        'video/webm;codecs=vp9,opus',
        'video/webm;codecs=vp8,opus',
        'video/webm;codecs=vp9',
        'video/webm;codecs=vp8',
        'video/webm'
      ];
      for (const type of candidates){
        try{
          if (MediaRecorder.isTypeSupported(type)) return type;
        }catch(e){}
      }
      return '';
    }

    function downloadBlob(blob, filename){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 3000);
    }

    async function saveMemory(){
      if (!memoryItems.length){
        showMessage('保存するものがまだないよ');
        return;
      }

      const files = memoryItems.map(item => new File([item.blob], item.filename, {
        type: item.type || item.blob.type || 'application/octet-stream'
      }));

      try{
        if (
  navigator.canShare &&
  navigator.share &&
  files.every(f => navigator.canShare({ files:[f] }))
)
          await navigator.share({
            files,
            title: 'Camera Memory',
            text: '保存した写真と動画'
          });
          clearMemory();
          showMessage('メモリから保存したよ', 1600);
          return;
        }
      }catch(err){
        console.log('share failed', err);
      }

      for (const item of memoryItems){
        downloadBlob(item.blob, item.filename);
        await new Promise(r => setTimeout(r, 140));
      }
      clearMemory();
      showMessage('保存を開始したよ', 1600);
    }

    function drawZoomedFrameToCanvas(canvas, sourceVideo, zoom){
      const ctx = canvas.getContext('2d', { willReadFrequently: false });
      const vw = sourceVideo.videoWidth;
      const vh = sourceVideo.videoHeight;

      if (!vw || !vh) return false;

      canvas.width = vw;
      canvas.height = vh;

      if (zoom <= 1){
        ctx.drawImage(sourceVideo, 0, 0, vw, vh);
        return true;
      }

      const cropW = vw / zoom;
      const cropH = vh / zoom;
      const sx = Math.max(0, (vw - cropW) / 2);
      const sy = Math.max(0, (vh - cropH) / 2);

      ctx.drawImage(sourceVideo, sx, sy, cropW, cropH, 0, 0, vw, vh);
      return true;
    }

    function formatDate(){
      const d = new Date();
      const pad = n => String(n).padStart(2, '0');
      return (
        d.getFullYear() +
        pad(d.getMonth() + 1) +
        pad(d.getDate()) + '_' +
        pad(d.getHours()) +
        pad(d.getMinutes()) +
        pad(d.getSeconds())
      );
    }

    async function capturePhoto(){
      if (!video.videoWidth || !video.videoHeight){
        showMessage('まだカメラの準備中だよ');
        return;
      }

      const ok = drawZoomedFrameToCanvas(hiddenCanvas, video, currentZoom);
      if (!ok){
        showMessage('写真を撮れなかった');
        return;
      }

      hiddenCanvas.toBlob((blob) => {
        if (!blob){
          showMessage('写真の保存に失敗した');
          return;
        }
        const filename = `photo_${formatDate()}.jpg`;
        addToMemory('photo', blob, filename);
        showMessage('写真をメモリに入れたよ', 1200);
      }, 'image/jpeg', 0.95);
    }

    function startRecording(){
      if (!stream){
        showMessage('カメラの準備がまだだよ');
        return;
      }
      if (!window.MediaRecorder){
        showMessage('このブラウザは動画録画に対応していないかも');
        return;
      }
      if (isRecording) return;

      const mimeType = getBestMimeType();
      try{
        mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      }catch(err){
        console.error(err);
        showMessage('動画録画を開始できなかった');
        return;
      }

      recordedChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data && e.data.size > 0){
          recordedChunks.push(e.data);
        }
      };

      mediaRecorder.onstop = () => {
        const type = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : 'video/webm';
        const blob = new Blob(recordedChunks, { type });
        if (blob.size > 0){
          const ext = type.includes('mp4') ? 'mp4' : 'webm';

const fixedType = type.includes('mp4')
  ? 'video/mp4'
  : 'video/webm';
          const filename = `video_${formatDate()}.${ext}`;
          const fixedBlob = new Blob([blob], { type: fixedType });
addToMemory('video', fixedBlob, filename);
          showMessage('動画をメモリに入れたよ', 1200);
        }else{
          showMessage('録画データが空だった');
        }
      };

      try{
        mediaRecorder.start();
        isRecording = true;
        videoBtn.classList.add('recording');
        showMessage('録画スタート', 1000);
      }catch(err){
        console.error(err);
        showMessage('録画開始に失敗した');
      }
    }

    function stopRecording(){
      if (!mediaRecorder || !isRecording) return;
      try{
        mediaRecorder.stop();
      }catch(err){
        console.error(err);
      }
      isRecording = false;
      videoBtn.classList.remove('recording');
      showMessage('録画ストップ', 1000);
    }

    function toggleRecording(){
      if (isRecording) stopRecording();
      else startRecording();
    }

    async function stopStream(){
      if (stream){
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        activeTrack = null;
        supportsTrackZoom = false;
        hardwareZoomAvailable = false;
        hardwareZoomMin = 1;
        hardwareZoomMax = 1;
      }
    }

    async function startCamera(facingMode = 'environment'){
      await stopStream();

      try{
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: facingMode },
            width: { ideal: 1920 },
            height: { ideal: 1080 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();

        const tracks = stream.getVideoTracks();
        activeTrack = tracks && tracks[0] ? tracks[0] : null;

        supportsTrackZoom = false;
        hardwareZoomAvailable = false;

        if (activeTrack && activeTrack.getCapabilities){
          const cap = activeTrack.getCapabilities();
          supportsTrackZoom = typeof cap.zoom !== 'undefined';

          if (supportsTrackZoom && cap.zoom){
            hardwareZoomAvailable = true;
            hardwareZoomMin = typeof cap.zoom.min === 'number' ? cap.zoom.min : 1;
            hardwareZoomMax = typeof cap.zoom.max === 'number' ? cap.zoom.max : 1;
          }
        }

        // 0.5x が使えるなら、実機ズームを優先して有効化
        if (hardwareZoomAvailable && currentZoom === 0.5 && hardwareZoomMin <= 0.5){
          await applyHardwareZoom(0.5);
          video.style.transform = 'none';
        }else{
          updateZoomVisual();
          const ok = await applyHardwareZoom(currentZoom);
          if (!ok){
            video.style.transform = `scale(${currentZoom})`;
          }else{
            video.style.transform = 'none';
          }
        }

        showMessage(facingMode === 'user' ? 'インカメラにしたよ' : '外カメラにしたよ', 1000);
      }catch(err){
        console.error(err);
        showMessage('カメラを使えなかった。権限を確認してね');
      }
    }

    async function switchCamera(){
      if (isRecording){
        stopRecording();
      }
      currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
      await startCamera(currentFacing);
    }

    function getSwipeDirection(dx, dy){
      return Math.abs(dx) > Math.abs(dy) ? 'horizontal' : 'vertical';
    }

    gestureLayer.addEventListener('pointerdown', (e) => {
      controlsSwipeActive = false;
      controlsSwipeLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
    });

    gestureLayer.addEventListener('pointermove', async (e) => {
      if (controlsSwipeLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 16 && Math.abs(dy) < 16) return;

      if (getSwipeDirection(dx, dy) === 'vertical'){
        const distance = dy;
        const steps = Math.floor(Math.abs(distance) / 70);

        if (steps >= 1){
          controlsSwipeLocked = true;
          const dir = distance < 0 ? 'up' : 'down';
          const nextZoom = getNextZoom(dir);
          await setZoom(nextZoom);
        }
      }
    });

    controls.addEventListener('pointerdown', (e) => {
      if (e.target.closest('button')) return;

      controlsSwipeActive = true;
      controlsSwipeLocked = false;
      swipeStartX = e.clientX;
      swipeStartY = e.clientY;
    });

    controls.addEventListener('pointermove', (e) => {
      if (!controlsSwipeActive || controlsSwipeLocked) return;

      const dx = e.clientX - swipeStartX;
      const dy = e.clientY - swipeStartY;

      if (Math.abs(dx) < 18 && Math.abs(dy) < 18) return;

      if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy)){
        controlsSwipeLocked = true;
        toggleSwap();
      }
    });

    controls.addEventListener('pointerup', () => {
      controlsSwipeActive = false;
      controlsSwipeLocked = false;
    });

    controls.addEventListener('pointercancel', () => {
      controlsSwipeActive = false;
      controlsSwipeLocked = false;
    });

    videoBtn.addEventListener('click', toggleRecording);
    photoBtn.addEventListener('click', capturePhoto);
    switchBtn.addEventListener('click', switchCamera);
    memorySaveBtn.addEventListener('click', saveMemory);

    zoomPill.addEventListener('click', async () => {
      await setZoom(1);
      showMessage('ズームを1倍に戻したよ', 900);
    });

    window.addEventListener('beforeunload', () => {
      if (mediaRecorder && mediaRecorder.state === 'recording'){
        try{ mediaRecorder.stop(); }catch(e){}
      }
      if (stream){
        stream.getTracks().forEach(t => t.stop());
      }
    });

    updateMemoryButton();
    zoomPill.textContent = 'x1';
    startCamera(currentFacing);
  </script>
</body>
</html>
